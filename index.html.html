", "opts": ["返回多行多列", "返回<b>单个值（一行一列）</b>，否则运行时报错", "不能引用外层列", "必须用 ALL"], "ans": 1, "exp": "✅ <b>B 正确</b>：标量子查询必须返回单值。若返回多行会报错。常用于在结果中附加每行的计算值（如各自的均值差）。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】<code>UNION</code> 与 <code>UNION ALL</code> 的区别？", "opts": ["没有区别", "UNION 去除重复行（隐含排序去重，较慢）；UNION ALL 保留所有行（含重复，更快）", "UNION ALL 去重", "UNION 保留重复"], "ans": 1, "exp": "✅ <b>B 正确</b>：UNION 去重；UNION ALL 不去重、性能更好。确定无重复或允许重复时优先 UNION ALL。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】EXCEPT（差集）运算符的含义及注意点是？", "opts": ["求两查询交集", "返回出现在第一个查询但不在第二个查询中的行；部分 DBMS（如 MySQL 旧版）不支持，需用 NOT EXISTS/LEFT JOIN 替代", "求并集", "总是被所有数据库支持"], "ans": 1, "exp": "✅ <b>B 正确</b>：EXCEPT = 集合差。MySQL 较老版本不支持，可用 <code>NOT EXISTS</code> 或 <code>LEFT JOIN … WHERE IS NULL</code> 等价实现。", "new": true}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 1", "q": "Which of the following statements is NOT CORRECT?", "opts": ["At the operational level, day to day business decisions are made, typically in real-time or with a short time frame.", "At the tactical level, decisions are made by middle management with a medium-term (e.g. a month, a quarter, a year) focus.", "At the strategic level, decisions are made by senior management with long term implications (e.g., 1, 2, 5 years or more)", "A data warehouse provides a centralized, consolidated data platform by integrating data from different sources and in different formats. As such, it provides a separate and dedicated environment for operational decision making."], "ans": 3, "exp": "✅ <b>D 错误</b>：数据仓库服务的是<b>战术/战略</b>决策，不是运营决策。运营决策用 OLTP 系统。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 2", "q": "In terms of data manipulation, a data warehouse focusses on", "opts": ["Insert/Update/Delete/Select statements", "Insert/Select statements", "Select/Update statements", "Delete statements"], "ans": 1, "exp": "✅ <b>B 正确</b>：数据仓库非易失，主要 <b>INSERT（ETL 批量加载）+ SELECT（只读分析）</b>，几乎不做 UPDATE/DELETE。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 3", "q": "Which statement is CORRECT?", "opts": ["A star schema has one large central dimension table which is connected to various smaller fact tables.", "The dimension tables of a star schema contain the criteria for aggregating the measurement data and will typically be used as constraints to answer queries.", "To speed up report generation and avoid time consuming joins in a star schema, the dimension tables need to be normalized.", "The dimension tables in a star schema are frequently updated."], "ans": 1, "exp": "✅ <b>B 正确</b>：维度表含聚合标准（年/地区/产品），用作查询过滤条件。A 错（中心大表是事实表）；C 错（星型维度是去规范化的）；D 错（维度表很少更新）。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 4", "q": "Which statement is NOT CORRECT?", "opts": ["A snowflake schema normalizes the fact table of a star schema.", "A fact constellation schema has more than one fact table which can share dimension tables.", "Surrogate keys essentially buffer the data warehouse from the operational environment by making it immune to any operational changes.", "A factless fact table is a fact table which only contains foreign keys and no measurement data."], "ans": 0, "exp": "✅ <b>A 错误</b>：雪花模式规范化的是<b>维度表</b>，不是事实表。其余对 fact constellation、surrogate key、factless fact table 的描述正确。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 5", "q": "Which statement is NOT CORRECT?", "opts": ["Junk dimensions can be defined to efficiently accommodate low cardinality attribute types such as flags or indicators.", "An outrigger table can be defined to store a set of attribute types of a dimension table which are uncorrelated, high in cardinality and updated simultaneously.", "For slowly changing dimensions, surrogate keys can be handy to store the historical information by duplicating a record and adding, e.g., Start_Date, End_Date and Current_Flag attribute types.", "One way to deal with rapidly changing dimensions is by splitting the information into stable and rapidly changing information. The latter can then be put into a separate mini-dimension table with a new surrogate key. The connection can then be made by using the fact table or by introducing a new table connecting both."], "ans": 1, "exp": "✅ <b>B 错误</b>：outrigger 表存的是维度中<b>低基数、相关</b>属性（雪花化的一部分）；“高基数、同时更新“是 mini-dimension（快速变化维度）的特征。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 6", "q": "Which statement about ETL is NOT CORRECT?", "opts": ["Some estimates state that the ETL step can consume up to 80% of all efforts needed to set up a data warehouse.", "To decrease the burden on both the operational systems and the data warehouse itself, it is recommended to start the ETL process by dumping the data in a staging area where all the ETL activities can be executed.", "During the loading step, the data warehouse is populated by filling the fact and dimension tables hereby also generating the necessary surrogate keys to link it all up. Fact rows should be inserted/updated before the dimension rows.", "The extraction strategy can be either full or incremental. In the latter case, only the changes since the previous extraction are considered."], "ans": 2, "exp": "✅ <b>C 错误</b>：加载顺序应为<b>先维度行、后事实行</b>（否则事实表外键无对应维度行，违反参照完整性）。其余对 ETL（80%工作量、staging、全量/增量）描述正确。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 7", "q": "A data warehouse is:", "opts": ["Subject-oriented, integrated, time-variant and volatile.", "Time-oriented, integrated, time-variant and volatile.", "Subject-oriented, integrated, time-invariant and non-volatile.", "Subject-oriented, integrated, time-variant and non-volatile."], "ans": 3, "exp": "✅ <b>D 正确</b>：数据仓库 = Subject-oriented + Integrated + Time-variant + <b>Non-volatile</b>（非易失）。注意区分 time-variant（记录历史）与 volatile（频繁改）。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 8", "q": "Which of the following statements is CORRECT?", "opts": ["The information system needed to make operational decisions is often referred to as a decision support systems (DSS).", "Operational data is always up-to-date and represents the most recent state.", "Decision making at strategic level is usually about day-to-day decisions.", "A data warehouse should always be up-to-date."], "ans": 1, "exp": "✅ <b>B 正确</b>：操作型数据总是最新、反映当前状态。A 错（DSS 是战术/战略层，非运营）；C 错（战略层非日常决策）；D 错（数据仓库不必时刻最新，周期加载）。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 9", "q": "Given the following two statements, which of them are CORRECT? A snowflake schema is a denormalized star schema. Star schemas have a more efficient use of storage.", "opts": ["Both statements are correct.", "Statement i is correct, but statement ii is not correct.", "Statement ii is correct, but statement i is not correct;", "Both statements are not correct."], "ans": 3, "exp": "✅ <b>B 正确</b>：GROUPING SETS((QUARTER),(REGION)) 只产生按季度、按地区两组小计（聚合维取 NULL），不含 (QUARTER,REGION) 明细，也不含总计。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 10", "q": "Which of the following statements is NOT CORRECT?", "opts": ["Surrogate keys are typically meaningless integers, used as foreign keys to connect the fact to the dimension tables.", "Business keys usually have a business meaning that may change over time.", "Surrogate keys are usually larger than business keys to speed up query execution time.", "Surrogate keys essentially buffer the data warehouse from the operational environment by making it immune to any operational changes."], "ans": 2, "exp": "✅ <b>C 错误</b>：OLAP 的优势<b>恰恰是</b>支持交互式分析、汇总和多角度可视化。说它“不允许“是错的。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 11", "q": "Which of the following statements is CORRECT?", "opts": ["When choosing the granularity of the fact table, a trade-off between the level of detailed analysis and storage requirements (and hence query performance) must be made.", "A factless fact table contains no measurement data and is therefore useless.", "In a fact constellation schema, only one fact table is used.", "A junk dimension can be used for attribute types that are highly correlated, high in cardinality and simultaneously updated."], "ans": 0, "exp": "✅ <b>D 错误</b>：方向反了——<b>MOLAP 扩展到更多维度的能力比 ROLAP 差</b>（多维数组稀疏/维度爆炸），但 MOLAP <b>查询性能通常优于</b> ROLAP。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 12", "q": "Which of the following statements is NOT CORRECT?", "opts": ["A slowly changing dimension in a data warehouse context is a dimension that changes slowly and irregularly over a period of time.", "Slowly changing dimensions in a data warehouse environment can be tackled by overwriting the old value with the new value. This approach can be used to correct data errors.", "Slowly changing dimensions in a data warehouse environment can be tackled by duplicating records and adding Start_Date, End_Date and Current_Flag attribute types. This approach only allows to retain partial historical information.", "Slowly changing dimensions in a data warehouse environment can be tackled by adding a new attribute type to the table such that only the most recent and previous value of it are stored."], "ans": 2, "exp": "✅ <b>D 正确（全部都对）</b>：Roll-up=聚合；Roll-down/Drill-down=去聚合（更细）；Dicing=多维范围选择。三者描述均正确。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 13", "q": "Which of the following statements is CORRECT?", "opts": ["The ETL process is only executed right before the data warehouse is made operational.", "During the loading step of the ETL process, the data warehouse is populated by filling the fact and dimension tables. Dimension rows should be inserted/updated before the fact rows are inserted/updated.", "During the ETL process, a staging area can be used to decrease the burden on the operational systems and the data warehouse. This area can then be used to execute (complex) queries.", "In the context of an ETL process, an incremental extraction strategy only extracts data from specific business units."], "ans": 1, "exp": "该题问 ROLLUP(customer_id, genre) 查询<b>不能</b>回答哪个问题，正确选项已标注。💡 ROLLUP 按层次汇总，不产生单独按 genre 的小计。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 14", "q": "Which of the following statements is NOT CORRECT?", "opts": ["One way to deal with a rapidly changing dimension in a data warehouse context is by splitting all information into stable and rapidly changing information and put the latter into a separate mini-dimension table with a new surrogate key. Both tables can then be connected by the fact table.", "In a data warehouse context, the definition of junk dimensions greatly contributes to the maintainability and query performance.", "The transformation step in the ETL process often implies encoding the data uniformly.", "Dimension tables often have a lot of columns. They usually also have a larger number of rows compared to the fact table."], "ans": 3, "exp": "✅ <b>D 错误</b>：维度表列多<b>但行数通常远少于</b>事实表（事实表才是持续增长的大表）。其余对 mini-dimension、junk dimension、ETL 编码统一的描述正确。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "原题 MC 15", "q": "Which of the following statements is NOT CORRECT?", "opts": ["One of the reasons for using surrogate keys in addition to business keys, next to speed and potential changes in the operations of the business, is that business keys are sometimes re-used over a long period of time.", "Even though factless fact tables do not contain measurement data, they can still be used to log events.", "A drawback of using outrigger tables is that an extra join is needed to combine both tables when they are needed for analysis.", "To deal with a rapidly changing dimension, you create a mini-dimension table that stores the stable information."], "ans": 3, "exp": "✅ <b>D 错误</b>：处理快速变化维度时，mini-dimension 表存的是<b>快速变化</b>的信息，不是稳定信息。其余对 surrogate key 复用、factless 记录事件、outrigger 需额外 join 的描述正确。", "new": false}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "自编", "q": "【自编题】缓慢变化维度 SCD 的三种类型对应？", "opts": ["Type1=新增行；Type2=覆盖；Type3=额外列", "Type1=覆盖(无历史)；Type2=新增行+Start/End/Current_Flag(完整历史)；Type3=额外列存前值(有限历史)", "三者都保存完整历史", "Type2 不保存历史"], "ans": 1, "exp": "✅ <b>B 正确</b>：Type1 覆盖（丢历史）；Type2 新增行（完整历史，最常考）；Type3 加列存前一值（有限历史）。", "new": true}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "自编", "q": "【自编题】代理键（surrogate key）相比业务键的主要优势是？", "opts": ["业务键更稳定应优先", "代理键是无业务含义的系统整数，隔离业务键变更、支持 SCD Type2、整数 JOIN 更快", "代理键无法做 JOIN", "二者功能完全相同"], "ans": 1, "exp": "✅ <b>B 正确</b>：代理键隔离操作环境变更（业务键可能被重用/改动）、支持同一业务实体多版本（SCD2）、整数连接高效。", "new": true}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "自编", "q": "【自编题】无事实事实表（factless fact table）的特征是？", "opts": ["只有度量没有外键", "只有指向各维度的外键、没有数值度量，用于记录事件发生（如选课、考勤）", "就是普通维度表", "不能用于分析"], "ans": 1, "exp": "✅ <b>B 正确</b>：factless fact table 只含 FK 不含 measure，用于事件记录或覆盖分析（哪些组合发生/未发生）。", "new": true}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "自编", "q": "【自编题】星型模式与雪花模式的核心区别？", "opts": ["星型规范化维度，雪花去规范化", "雪花模式把星型的维度表进一步<b>规范化</b>，减少冗余但增加 JOIN，查询可能更慢", "雪花只能一个事实表", "二者查询性能完全相同"], "ans": 1, "exp": "✅ <b>B 正确</b>：星型=去规范化维度（少 JOIN、快）；雪花=规范化维度（省空间、多 JOIN、可能慢）。多事实表共享维度是 fact constellation。", "new": true}, {"ch": "L8DW", "label": "第17章 · 数据仓库与 BI", "src": "自编", "q": "【自编题】垃圾维度（junk dimension）的用途是？", "opts": ["存储高基数的人口统计属性", "把多个低基数的标志位/指示符（flags/indicators）合并到一张小维度表，避免散落在事实表中", "存储事实表主键", "规范化事实表"], "ans": 1, "exp": "✅ <b>B 正确</b>：junk dimension 合并多个低基数标志（如 是否付费/是否补考），用一张小表 + 一个 FK 取代事实表中一堆标志列。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "原题 MC 1", "q": "Which of the following statements is NOT CORRECT?", "opts": ["Embedded database APIs can use early binding.", "Embedded database APIs can use late binding.", "Call-level database APIs can use early binding.", "Call-level database APIs can use late binding."], "ans": 1, "exp": "✅ <b>B 错误</b>：嵌入式 API 只能<b>早期绑定（静态 SQL）</b>，编译时预编译。晚期绑定（动态 SQL）是调用级 API（JDBC/ODBC）的特性。", "new": false}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "原题 MC 2", "q": "Which of the following statements is CORRECT?", "opts": ["A centralized DBMS uses a mainframe that only handles the execution of applications and the querying of the results, but not the interface to the user.", "A fat client makes sure that there is a tight coupling between the way the application works and interface with the user.", "A fat server variant presents the results to the user, runs the applications and executes the queries on the server.", "None of the above."], "ans": 1, "exp": "✅ <b>B 正确</b>：胖客户端（fat client）= 表示逻辑 + 应用逻辑都在客户端，与界面紧耦合。A 错（集中式主机也处理界面）；C 错（呈现结果属表示层）。", "new": false}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "原题 MC 3", "q": "Which of the following statements is NOT CORRECT?", "opts": ["If the marketing department runs its applications on separate server which interacts with the DMBS, the company uses a three-tier architecture.", "Browsing the internet can be seen as an n-tier activity where the internet browser handles the presentation logic and the web server the application logic.", "The advantage of working with a separate web and application server is it adds an extra layer of security, since the application server can only be called be the web server.", "Working with a traditional client-server set-up leads to a lot of maintenance issues since all the PCs must always be up-to-date."], "ans": 2, "exp": "✅ <b>C 错误</b>：分离 Web/应用服务器的安全优势在于<b>应用服务器只能被 Web 服务器调用</b>——题中把因果说反/表述错误（原句逻辑不成立）。其余对三层、n 层、客户端维护的描述正确。", "new": false}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "原题 MC 4", "q": "Consider the following two statements: Early binding can only be used with embedded APIs, just as late binding can only be used with call-level APIs. A drawback of dynamic SQL is that syntax errors can only be spotted when the program is wrongly executed. Which of the following statements is CORRECT?", "opts": ["Statement 1 and 2 are correct.", "Only statement 1 is correct.", "Only statement 2 is correct.", "Both statement are incorrect."], "ans": 2, "exp": "✅ <b>C 正确（仅陈述 2 对）</b>：陈述 1 错——早/晚绑定并非严格只对应嵌入/调用级。陈述 2 对——动态 SQL 的缺点是语法错误只在运行时才暴露。", "new": false}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "原题 MC 5", "q": "Which of the following statement is NOT CORRECT?", "opts": ["CGI was one if the first technologies that allowed for the construction of dynamic webpages.", "CGI programs can be written in almost any programming language.", "An important drawback of CGI was the fact that it could not handle database querying.", "An advantage of CGI was that it could deal with user-supplied input, such as provided through HTML forms."], "ans": 2, "exp": "✅ <b>C 错误</b>：CGI 的重要缺点<b>不是</b>“无法处理数据库查询“——CGI 恰恰能处理数据库查询。真正缺点是每个请求都启动新进程，开销大。", "new": false}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "原题 MC 6", "q": "Which statement about the common gateway interface is CORRECT?", "opts": ["The CGI uses a separate application server which handles the creation of a HTML page.", "Basic HTML forms were already introduced in the original web-server set-up. CGI was proposed to provide a dynamic output for the dynamic input.", "The basic idea and implementation of interactive forms and dynamic pages from the CGI is still used nowadays, where every request from the client leads to a new program being used.", "Whereas in the beginning the CGI the server in the client-server set-up was mainly a web server, the CGI web server is now transformed to an application server using HTTP as the lingua franca."], "ans": 3, "exp": "✅ <b>D 正确</b>：随 CGI 演进，原 Web 服务器转变为以 HTTP 为通用语言的<b>应用服务器</b>。其余选项对 CGI 历史的描述有误。", "new": false}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】静态 SQL（static/embedded）与动态 SQL（dynamic）的区别？", "opts": ["没有区别", "静态 SQL 编译时预编译固定（早绑定，编译期查错）；动态 SQL 运行时构建（晚绑定，更灵活但错误运行时才暴露）", "静态 SQL 更灵活", "动态 SQL 不能参数化"], "ans": 1, "exp": "✅ <b>B 正确</b>：静态/嵌入式=早绑定（precompile）；动态=晚绑定（运行时）。动态灵活但语法错误运行时才发现。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】胖客户端（fat client）与瘦客户端（thin client），Web 浏览器属于哪种？", "opts": ["浏览器是胖客户端，处理全部应用逻辑", "浏览器是瘦客户端（主要处理表示层），应用逻辑在服务器；胖客户端则表示+应用逻辑都在客户端", "二者无区别", "浏览器既不胖也不瘦"], "ans": 1, "exp": "✅ <b>B 正确</b>：瘦客户端只负责表示（浏览器渲染 HTML/CSS/JS）；胖客户端表示+应用逻辑都在本地。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】CGI（Common Gateway Interface）的主要缺点是？", "opts": ["无法处理数据库查询", "每个请求都启动一个新进程，开销大、难以扩展", "只能用 C 语言", "不能处理表单输入"], "ans": 1, "exp": "✅ <b>B 正确</b>：CGI 每请求 fork 新进程 → 高开销、扩展差。它<b>能</b>处理数据库查询和表单输入，可用多种语言。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】三层架构中分离 Web 服务器与应用服务器的安全优势是？", "opts": ["没有优势", "应用服务器只能被 Web 服务器调用，对外不直接暴露，增加一层安全隔离", "让数据库直接面向用户", "取消身份认证"], "ans": 1, "exp": "✅ <b>B 正确</b>：应用服务器置于 Web 服务器之后，仅由 Web 层调用，攻击者无法直连应用/数据层，增强纵深防御。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】ODBC/JDBC 属于哪种数据库 API？", "opts": ["嵌入式 API（早绑定）", "调用级 API（call-level，晚绑定/动态 SQL）", "只支持单一数据库", "不需要驱动"], "ans": 1, "exp": "✅ <b>B 正确</b>：ODBC/JDBC 是调用级 API，运行时通过驱动连接，使用动态 SQL（晚绑定），可对接多种 DBMS。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】现代 Web 应用客户端交互增强常用技术栈是？", "opts": ["仅纯 HTML", "HTML5 + CSS3 + JavaScript + AJAX（XMLHttpRequest/fetch）异步通信", "只用 Flash/ActiveX", "只用 CGI"], "ans": 1, "exp": "✅ <b>B 正确</b>：现代栈 = HTML5/CSS3/JS + AJAX 异步局部刷新。Flash/ActiveX/Applet 已淘汰。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】集中式（centralized）DBMS 架构的特征是？", "opts": ["逻辑分布在多机", "DBMS 逻辑、数据、应用逻辑、表示逻辑都由同一个（中央）系统处理", "必须用云", "客户端处理所有逻辑"], "ans": 1, "exp": "✅ <b>B 正确</b>：集中式架构中所有职责（数据+应用+表示）集中在单一系统（如大型主机+哑终端）。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】n 层架构（n-tier）相比两层（client-server）的优势是？", "opts": ["层数越多越慢且无益", "进一步解耦（如独立的 Web 层、应用层、数据层），便于伸缩、复用与安全，多个应用可共享数据层", "必须把逻辑放回客户端", "取消了网络"], "ans": 1, "exp": "✅ <b>B 正确</b>：n 层把应用逻辑再细分到独立服务器，提高可伸缩性、可维护性与安全性，支持多应用共享后端。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】客户端脚本（如 JavaScript）的执行位置与早期采用障碍是？", "opts": ["在数据库服务器执行", "嵌入 HTML、由浏览器解释执行；早期受浏览器兼容性差异制约", "在应用服务器编译", "必须预编译"], "ans": 1, "exp": "✅ <b>B 正确</b>：客户端脚本由浏览器解释运行；早期不同浏览器实现不一致（兼容性）阻碍了采用，后由标准化缓解。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】下列哪项最准确描述“表示逻辑 / 应用逻辑 / 数据逻辑“三类职责？", "opts": ["三者等价", "表示逻辑=用户界面呈现；应用逻辑=业务规则处理；数据逻辑=数据存取与 DBMS 交互", "表示逻辑负责存储", "数据逻辑负责画界面"], "ans": 1, "exp": "✅ <b>B 正确</b>：三层职责清晰：presentation（UI）/ application（业务规则）/ data（DBMS 存取）。分层架构正是据此切分。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】Node.js 在数据库应用开发中的意义是？", "opts": ["只能写前端", "让 JavaScript 也能运行在<b>服务器端</b>，实现前后端同语言、异步 I/O 高并发", "取代了数据库", "只能跑在浏览器"], "ans": 1, "exp": "✅ <b>B 正确</b>：Node.js 把 JS 带到服务端，统一前后端语言，事件驱动异步 I/O 适合高并发网络应用。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】RESTful API 在 n 层 Web 架构中的角色是？", "opts": ["替代数据库存储引擎", "作为应用层对外暴露的、基于 HTTP 的无状态接口，供前端/其他服务调用", "只用于静态页面", "等同于 SQL"], "ans": 1, "exp": "✅ <b>B 正确</b>：REST API 是基于 HTTP 的无状态服务接口，前端通过它访问应用层逻辑，是现代 n 层架构的常见集成方式。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】预编译语句（prepared statement / parameterized query）的主要好处是？", "opts": ["只是语法糖", "预编译可复用执行计划并通过参数绑定防止 SQL 注入", "会变慢", "必须用动态拼接字符串"], "ans": 1, "exp": "✅ <b>B 正确</b>：预编译语句分离 SQL 与数据，参数化绑定可防 SQL 注入，并能复用执行计划提升性能。", "new": true}, {"ch": "L8API", "label": "第15章 · 数据库 API 与访问", "src": "自编", "q": "【自编题】二层“胖服务器（fat server / thin client）“变体的特征是？", "opts": ["客户端处理应用逻辑", "应用逻辑在服务器运行，客户端只做表示——便于集中维护、降低客户端要求", "服务器只存数据", "没有网络通信"], "ans": 1, "exp": "✅ <b>B 正确</b>：胖服务器把应用逻辑放服务器，客户端瘦（只表示），便于集中维护升级，客户端硬件要求低。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 1", "q": "Which statement is CORRECT?", "opts": ["A key distinguishing property of a data lake is that it stores raw data in its native format which could be structured, unstructured or semi-structured.", "A data lake is targeted towards decision makers at middle and top management level, whereas a data warehouse requires a data scientist, which is a more specialized profile in terms of data handling and analysis.", "In case of a data warehouse, the data schema definitions are only determined when the data is read (schema-on-read) whereas for data lakes it is fixed when the data is loaded (schema-on-write).", "A data lake is less agile compared to a data warehouse which has no structure."], "ans": 0, "exp": "✅ <b>A 正确</b>：数据湖以<b>原始格式</b>存储结构化/非结构化/半结构化数据。B 错（数据湖面向数据科学家）；C 错（数据湖 schema-on-read，数据仓库 schema-on-write，描述反了）；D 错（数据湖更灵活）。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 2", "q": "Which of the following statements is NOT CORRECT?", "opts": ["Independent data marts are standalone systems, drawing their data directly from operational systems, external sources or a combination of both.", "A data lake stores raw data in its native format, which could be structured, unstructured, or semi-structured.", "The data schema deﬁnitions in a data lake are only determined when the data are read (schema-on-read) instead of when the data are loaded (schema-on-write) as is the case for a data warehouse.", "A virtual data warehouse or virtual data mart can be used to relieve underlying (operational) data sources from intensive processing."], "ans": 3, "exp": "✅ <b>D 错误</b>：虚拟数据仓库无物理数据、查询时实时访问底层，<b>增加</b>而非减轻底层系统负担。其余对独立数据集市、数据湖的描述正确。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 3", "q": "Which of the following statement is CORRECT?", "opts": ["A data warehouse is a scaled-down version of a data mart aimed at meeting the information needs of a homogeneous small group of end-users such as a department or business unit.", "An operational data store (ODS) is a staging area with query functionality. This area is mainly used for simple, real time queries.", "Outdated and inconsistent data is a key risk when working with a virtual data warehouse or virtual data mart.", "A data lake assumes that data schema definitions are determined when the data are loaded (schema-on-write)."], "ans": 1, "exp": "✅ <b>B 正确</b>：ODS（操作数据存储）= 带查询功能的暂存区，用于简单实时查询。A 错（数据仓库不是“缩小版数据集市“，反了）；C 错（虚拟仓库的风险是数据可能过时，但此处表述）；D 错（数据湖是 schema-on-read）。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 4", "q": "Which of the following statements is NOT CORRECT?", "opts": ["Virtual data warehouses or virtual data marts offer a solution for the fact that data warehouses do not always contain the most recent version of the data.", "Data marts use middleware to offer queries with a real time perspective on the underlying evolving data. Queries are reformulated and decomposed on the fly, where the underlying data is fetched and consolidated on demand.", "In a data lake, there is no standard ETL process. For example, the transformation step often only takes place after data is stored, and just before the analysis is started.", "When dealing with slowly changing dimensions, one way to store partial historical information is by adding a new attribute type to the table, so we keep only the most recent and previous value of that attribute type."], "ans": 1, "exp": "✅ <b>B 错误</b>：用中间件提供实时视图、查询动态分解的是<b>虚拟数据仓库</b>，不是普通数据集市。其余对虚拟仓库、数据湖 ETL、SCD 的描述正确。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 5", "q": "Which statement is NOT CORRECT?", "opts": ["A data mart is a scaled down version of a data warehouse aimed at meeting the information needs of a homogeneous small group of end-users such as a department or business unit (e.g., marketing, finance, logistics, HR, etc.).", "Dependent data marts pulls their data from a central data warehouse, whereas independent data marts are standalone systems drawing data directly from the operational systems, external sources or a combination of both.", "A virtual data warehouse (sometimes also called a federated database) or virtual data mart contains no physical data but provides a uniform and consolidated single point of access to a set of underlying physical data stores.", "A key advantage of virtualization is that it requires no extra processing capacity from the underlying (operational) data stores."], "ans": 3, "exp": "✅ <b>D 错误</b>：虚拟化<b>需要</b>底层系统额外处理能力（查询时实时访问）——说“不需要额外处理能力“是错的。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 6", "q": "Assume sales data is defined over three dimensions: product, quarter and region. If we want to take a look at the average sales for one single product across all quarters and per region, which OLAP operations should we perform?", "opts": ["Roll-up and dice.", "Roll-up and slice.", "Drill-down and dice.", "Drill-down and slice."], "ans": 1, "exp": "✅ <b>B（Roll-up + Slice）正确</b>：固定单个产品 = Slice（一维固定一个值）；对所有季度求均值 = Roll-up（沿季度维聚合）。💡 Slice=单维固定值；Dice=多维范围。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 7", "q": "Which of the following statements is CORRECT?", "opts": ["The key difference between the CUBE and ROLLUP OLAP operators is that the former generates a result set showing the aggregates for a hierarchy of values of the speciﬁed attribute types, whereas the latter generates a result set showing the aggregates for all combinations of values of the selected attribute types.", "The GROUPING SETS OLAP operator generates a result set equivalent to that generated by an INTERSECT of multiple simple GROUP BY clauses.", "Contrary to the RANK() OLAP function, the DENSE_RANK() OLAP function leaves gaps between the ranks.", "In OLAP, Windowing allows calculating cumulative totals or running averages based on a speciﬁed window of values"], "ans": 3, "exp": "✅ <b>D 正确</b>：Windowing 可基于指定窗口算累计总和/移动平均。A 错（CUBE/ROLLUP 描述反了）；B 错（GROUPING SETS 等价于 UNION 不是 INTERSECT）；C 错（DENSE_RANK 不留间隙）。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 8", "q": "Which query is equivalent to the following: SELECT QUARTER, REGION, SUM(SALES)FROM SALESTABLEGROUP BY ROLLUP (QUARTER, REGION)", "opts": ["SELECT QUARTER, REGION, SUM(SALES)FROM SALESTABLEGROUP BY GROUPING SETS ((QUARTER, REGION), (QUARTER),())", "SELECT QUARTER, REGION, SUM(SALES)FROM SALESTABLEGROUP BY CUBE (QUARTER, REGION)", "SELECT QUARTER, REGION, SUM(SALES)FROM SALESTABLEGROUP BY GROUPING SETS ((QUARTER, REGION), (REGION),())", "SELECT QUARTER, REGION, SUM(SALES)FROM SALESTABLEGROUP BY CUBE (REGION, QUARTER)"], "ans": 0, "exp": "✅ <b>A 正确</b>：ROLLUP(QUARTER, REGION) = GROUPING SETS((QUARTER,REGION),(QUARTER),())。CUBE 会多出 (REGION) 组。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 10", "q": "Which statement is NOT CORRECT?", "opts": ["Query and reporting tools are an essential component of a comprehensive business intelligence solution.", "A pivot or cross-table is a popular data summarization tool. It essentially cross-tabulates a set of dimensions.", "A key disadvantage of OLAP is that it does not allow to interactively analyze your data, summarize it and visualize it in various ways.", "The key fundament of OLAP is a multidimensional data model which can be implemented in various ways."], "ans": 2, "exp": "✅ <b>C 错误</b>：OLAP 的<b>优势</b>就是交互式分析/汇总/可视化，说它“不允许“是错的。query&reporting、pivot、多维模型描述均正确。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 11", "q": "Which statement is NOT CORRECT?", "opts": ["Multidimensional OLAP (MOLAP) stores the multidimensional data using a Multidimensional DBMS (MDBMS) whereby the data is stored in a multi-dimensional array-based data structure optimized for efficient storage and quick access.", "Relational OLAP (ROLAP) stores the data in a relational data warehouse, which can be implemented using a star, snowflake or fact constellation schema.", "Hybrid OLAP (HOLAP) tries to combine the best of both MOLAP and ROLAP. An RDBMS can then be used to store the detailed data in a relational data warehouse whereas the pre-computed aggregated data can be kept as a multidimensional array managed by a MDBMS.", "MOLAP scales better to more dimensions than ROLAP. The query performance may however be inferior to ROLAP unless some of the queries are materialized or high-performance indexes are defined."], "ans": 3, "exp": "✅ <b>D 错误</b>：MOLAP 扩展到更多维度<b>不如</b> ROLAP（多维数组稀疏问题）；MOLAP 查询通常更快。描述把可扩展性方向说反了。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "原题 MC 12", "q": "Which statement is CORRECT?", "opts": ["Roll-up (or drill-up) refers to aggregating the current set of fact values within or across one or more dimensions.", "Roll-down (or drill-down) de-aggregates the data by navigating from a lower level of detail to a higher level of detail.", "Dicing corresponds to a range selection on one or more dimensions.", "All of the above are correct."], "ans": 3, "exp": "✅ <b>D 正确（全部都对）</b>：Roll-up=维内/跨维聚合；Drill-down=从粗到细去聚合；Dicing=多维范围选择。三者均正确。", "new": false}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】OLAP 操作 Slice 与 Dice 的区别？", "opts": ["完全相同", "Slice=在<b>一个</b>维度上固定单值（降一维）；Dice=在<b>多个</b>维度上设范围（子立方体）", "Slice 是聚合，Dice 是去聚合", "Dice 只能用一个维度"], "ans": 1, "exp": "✅ <b>B 正确</b>：Slice 单维固定值；Dice 多维范围选择。Roll-up=聚合升级，Drill-down=细化，Pivot=旋转。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】ROLLUP(A,B) 与 CUBE(A,B) 生成的分组组合分别是？", "opts": ["都生成所有 4 组", "ROLLUP→(A,B),(A),()共3组(层次汇总)；CUBE→(A,B),(A),(B),()共4组(全组合)", "ROLLUP 生成 4 组，CUBE 生成 3 组", "二者相同"], "ans": 1, "exp": "✅ <b>B 正确</b>：ROLLUP 按层次从右去维（n+1 组）；CUBE 全组合（2^n 组）。GROUPING SETS 最灵活可手动指定。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】CAP 定理与 NoSQL 的典型取舍是？", "opts": ["可同时满足 C、A、P 三者", "三者最多同时满足两个；网络分区不可避免，多数 NoSQL 选 AP（最终一致性）", "NoSQL 不受 CAP 约束", "NoSQL 都选 CP"], "ans": 1, "exp": "✅ <b>B 正确</b>：CAP 三选二；P 不可避免 → 在 C 与 A 间取舍。多数 NoSQL 选 AP + 最终一致性（BASE）。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】RANK()、DENSE_RANK()、ROW_NUMBER() 处理并列(tie)的区别？", "opts": ["三者完全相同", "RANK 并列后跳号(1,2,2,4)；DENSE_RANK 并列后连续(1,2,2,3)；ROW_NUMBER 强制唯一序号(1,2,3,4)", "DENSE_RANK 跳号", "ROW_NUMBER 会并列"], "ans": 1, "exp": "✅ <b>B 正确</b>：RANK 跳号、DENSE_RANK 不跳、ROW_NUMBER 无视并列给唯一编号。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】NoSQL 四大类型的典型代表配对是？", "opts": ["MongoDB=键值；Redis=文档", "MongoDB=文档；Cassandra=列族；Redis=键值；Neo4j=图", "Neo4j=键值；Redis=图", "Cassandra=文档；MongoDB=列族"], "ans": 1, "exp": "✅ <b>B 正确</b>：文档(MongoDB)、列族(Cassandra)、键值(Redis)、图(Neo4j)。多数 NoSQL 走 BASE 而非 ACID。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】Windowing（窗口函数）相比 GROUP BY 的关键不同是？", "opts": ["二者相同", "窗口函数在保留<b>每一行</b>的同时计算分区内聚合（如移动平均/累计），GROUP BY 会把每组压成一行", "窗口函数会减少行数", "GROUP BY 能算移动平均"], "ans": 1, "exp": "✅ <b>B 正确</b>：<code>OVER(PARTITION BY … ORDER BY … ROWS BETWEEN …)</code> 保留明细行并附加窗口聚合；GROUP BY 折叠为每组一行。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】数据集市（data mart）与数据仓库（data warehouse）的关系？", "opts": ["数据集市比数据仓库范围更大", "数据集市是数据仓库的缩小版，面向单一部门/业务单元（如市场部）；可分依赖型（取自中央仓库）和独立型", "二者完全相同", "数据仓库取自数据集市"], "ans": 1, "exp": "✅ <b>B 正确</b>：data mart = 缩小版 DWH，服务同质小群体。依赖型从中央 DWH 取数；独立型直接从操作系统/外部源取数。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】schema-on-read 与 schema-on-write 分别对应？", "opts": ["数据湖 schema-on-write；数据仓库 schema-on-read", "数据湖 schema-on-read（读时定模式）；数据仓库 schema-on-write（写入时定模式）", "二者相同", "都在写入时定模式"], "ans": 1, "exp": "✅ <b>B 正确</b>：数据湖读时才定结构（schema-on-read，灵活存原始数据）；数据仓库加载时即定结构（schema-on-write，严格规范）。", "new": true}, {"ch": "L9", "label": "第18-20章 · 集成/OLAP/大数据", "src": "自编", "q": "【自编题】操作数据存储（ODS, Operational Data Store）的定位是？", "opts": ["长期历史分析仓库", "带查询功能的暂存/集成区，面向简单的近实时查询，介于操作系统与数据仓库之间", "数据湖的别名", "纯备份介质"], "ans": 1, "exp": "✅ <b>B 正确</b>：ODS 是带查询能力的集成暂存区，提供当前/近实时数据的简单查询，常作为通往数据仓库的中间层。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 1", "q": "Which statement is NOT CORRECT?", "opts": ["A transaction is a set of database operations (e.g., a consecution of SQL statements in a relation database), induced by a single user or application, that should be considered as one undividable unit of work.", "Transactions typically exist in isolation, and cannot be executed concurrently with other transactions on the same data.", "It should not be possible to terminate a transaction in such a wat that the database remains in an inconsistent state, because some operations of a single transaction were executed successfully and others were not.", "Recovery is the activity of ensuring that, whichever problem occurred, the database is returned to a consistent state afterwards, without any loss of data."], "ans": 1, "exp": "✅ <b>B 错误</b>：事务<b>可以</b>并发执行——DBMS 通过锁/MVCC 保证隔离性。说“不能并发“是错的。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 2", "q": "When a transaction is aborted, it is important that …", "opts": ["All changes made by the individual operations belonging to that transaction should be made permanent.", "A rollback of the transaction is executed: all changes made by the transaction’s representative operations should be undone."], "ans": 1, "exp": "✅ <b>B 正确</b>：事务中止（abort）时执行<b>回滚（rollback）</b>，撤销该事务所有操作的修改。把修改“变永久“是 commit 的行为。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 4", "q": "Which statement is NOT CORRECT?", "opts": ["The logfile contains all updates after they have been written to disk.", "The logfile contains redundant data.", "The logfile can be implemented as a sequential file.", "The logfile is often duplicated, e.g., in a RAID level 1 configuration."], "ans": 0, "exp": "✅ <b>A 错误</b>：日志（logfile）遵循 WAL——更新先写日志<b>再</b>写磁盘，所以日志记录的是“写入磁盘<b>之前</b>“的更新，不是“之后“。其余对日志冗余、顺序文件、RAID-1 镜像的描述正确。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 6", "q": "Which statement is NOT CORRECT?", "opts": ["Disk mirroring is a (near) real-time approach that writes the same data simultaneously to two or more physical disks.", "Archiving is an approach in which database files are copied periodically to other storage media, such as tape or (another) hard disk.", "Traditional relational databases allow for a certain measure of temporary inconsistency, in return for increased performance.", "There is a trade-off between the cost (overhead and storage cost) of more frequent backups and the cost of lost data because of less frequent backups."], "ans": 2, "exp": "✅ <b>C 错误</b>：传统关系数据库追求强一致性（ACID），<b>不</b>为性能容忍临时不一致——容忍最终一致性的是 NoSQL/BASE。其余对磁盘镜像、归档、备份频率权衡的描述正确。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 8", "q": "If the precedence graph contains a cycle, the schedule is …", "opts": ["Serializable.", "Not serializable."], "ans": 1, "exp": "✅ <b>B 正确</b>：前驱图（precedence graph）有环 → 调度<b>不可串行化</b>（non-serializable）。无环才可串行化。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 10", "q": "Which statement is CORRECT?", "opts": ["Multiple transactions may hold a shared lock on the same object.", "Multiple transactions may hold an exclusive lock on the same object."], "ans": 0, "exp": "✅ <b>A 正确</b>：多个事务可同时持有同一对象的<b>共享锁（S）</b>（共同读）；排他锁（X）只能被一个事务持有。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 11", "q": "Which statement is NOT CORRECT?", "opts": ["Deadlock prevention can be achieved by static 2PL.", "One approach for deadlock resolution is victim selection, which means choosing and aborting one of the transactions involved in the deadlock.", "The use of short-term locks violates rule 3 of the 2PL protocol, so serializability can be no longer guaranteed.", "The read commitment isolation level uses long-term read locks, but short-term write locks."], "ans": 3, "exp": "✅ <b>D 错误</b>：read committed 隔离级别用<b>短期读锁 + 长期写锁</b>（题中说反了）。A/B/C 对：静态 2PL 防死锁、victim selection 解死锁、短期锁违反 2PL 规则3。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 12", "q": "According to the MGL protocol …", "opts": ["Locks are acquired top-down, but released bottom-up in the hierarchy.", "Locks are acquired bottom-up, but released top-down in the hierarchy."], "ans": 0, "exp": "✅ <b>A 正确</b>：MGL（多粒度锁）规则——<b>自上而下加锁，自下而上释放锁</b>。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 13", "q": "Which statement is CORRECT?", "opts": ["A rollback of a transaction means that the last operation of a transaction should be undone.", "To redo an operation before images of all records are necessary.", "A write ahead log strategy means that all the updates are first written in the logfile before they are written to disk.", "All of the above are correct."], "ans": 2, "exp": "✅ <b>C 正确</b>：WAL（预写日志）= 所有更新先写日志、再写磁盘。A 错（回滚撤销整个事务非“最后一个操作“）；B 错（REDO 需 after-image 后像，不是 before-image）。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "原题 MC 15", "q": "Which statement is NOT CORRECT?", "opts": ["A downside of deadlock prevention is that the throughput is highly impacted because it first has to request all possible locks for execution.", "A read uncommitted isolation level is often applied to read-only transactions.", "The phantom read problem can be solved with a serializable isolation level.", "MGL protocol introduces additional locks, namely the s-lock and the x-lock."], "ans": 3, "exp": "✅ <b>D 错误</b>：MGL 引入的新锁是<b>意向锁 IS、IX</b>，不是 S、X（S/X 是基本锁）。其余对死锁预防开销、read uncommitted、serializable 解决幻读的描述正确。", "new": false}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】“一个事务读到另一未提交事务修改的数据“属于哪种并发问题？", "opts": ["丢失更新", "脏读（dirty read / uncommitted dependency）——若对方回滚则读到了从未存在的数据", "不可重复读", "幻读"], "ans": 1, "exp": "✅ <b>B 正确</b>：脏读=读未提交数据。四类问题：丢失更新、脏读、不可重复读、幻读。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】SQL 隔离级别从低到高排列正确的是？", "opts": ["Read Committed < Read Uncommitted < ...", "Read Uncommitted < Read Committed < Repeatable Read < Serializable", "Serializable < Repeatable Read < ...", "随机"], "ans": 1, "exp": "✅ <b>B 正确</b>：级别越高问题越少但并发越低。Read Uncommitted 允许脏读；Serializable 全部防止（含幻读）。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】共享锁(S)与排他锁(X)的相容性，下列正确的是？", "opts": ["S 与 S 互斥", "S-S 相容（多事务可同时读）；S-X、X-X 互斥（写需独占）", "X 与 X 相容", "所有锁都相容"], "ans": 1, "exp": "✅ <b>B 正确</b>：相容矩阵——S/S 相容；只要涉及 X 即互斥（读写、写写冲突）。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】WAL（Write-Ahead Logging，预写日志）规则是？", "opts": ["先写数据页，再写日志", "日志记录必须在对应数据页写入磁盘<b>之前</b>先持久化（先写日志）", "只记录已提交事务", "与恢复无关"], "ans": 1, "exp": "✅ <b>B 正确</b>：WAL=先写日志后写数据，保证崩溃后能 UNDO/REDO，是持久性与原子性的基础。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】崩溃恢复中 UNDO 与 REDO 的使用场景？", "opts": ["UNDO 重做已提交，REDO 撤销未提交", "UNDO 撤销未提交/中止事务(保原子性)；REDO 重做已提交但可能未落盘的事务(保持久性)", "只需 UNDO", "只需 REDO"], "ans": 1, "exp": "✅ <b>B 正确</b>：UNDO 撤销未提交（Atomicity）；REDO 重做已提交（Durability）。检查点缩小恢复范围。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】两阶段锁定(2PL)的“两个阶段“指？", "opts": ["读阶段和写阶段", "增长阶段(growing，只获取锁)与收缩阶段(shrinking，只释放锁)，一旦开始放锁就不能再加锁", "提交和回滚", "加锁和提交"], "ans": 1, "exp": "✅ <b>B 正确</b>：2PL 分增长阶段(只加锁)和收缩阶段(只放锁)。这保证可串行化。Strict 2PL 进一步要求锁持有到提交。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】Strict 2PL（严格两阶段锁）相比基本 2PL 的额外保证是？", "opts": ["防止死锁", "所有(排他)锁持有到事务提交/回滚后才释放，从而防止级联回滚(cascading rollback)", "提高并发但不安全", "取消加锁"], "ans": 1, "exp": "✅ <b>B 正确</b>：Strict 2PL 锁持有到 commit，防止读到未提交数据→无级联回滚。工业界最常用。它不解决死锁。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】多粒度锁定(MGL)引入的意向锁(IS、IX)作用是？", "opts": ["替代 S/X 锁", "在上层节点(表)标记下层(行)将加 S/X 锁，使粗细粒度锁冲突可被快速检测，无需扫描所有子节点", "只用于死锁检测", "加速磁盘 I/O"], "ans": 1, "exp": "✅ <b>B 正确</b>：意向锁 IS/IX 在层次结构中预告子节点的加锁意图，使表级与行级锁能高效共存。规则：自上而下加锁、自下而上放锁。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】检查点(checkpoint)时 T2 活跃未提交、T3 检查点后提交、T1 检查点前已提交。恢复时？", "opts": ["全部 REDO", "T1 无需操作；T2 需 UNDO；T3 需 REDO", "全部 UNDO", "只 UNDO T3"], "ans": 1, "exp": "✅ <b>B 正确</b>：检查点前已提交(T1)→已安全；未提交(T2)→UNDO；检查点后提交(T3)→REDO(可能未落盘)。", "new": true}, {"ch": "L10", "label": "第14章 · 事务管理与并发", "src": "自编", "q": "【自编题】乐观（optimistic）与悲观（pessimistic）并发控制的区别？", "opts": ["二者相同", "悲观：先加锁防冲突（2PL）；乐观：先执行、提交时验证有无冲突，冲突则回滚——串行调度器是极端乐观", "乐观一定更快", "悲观不用锁"], "ans": 1, "exp": "✅ <b>B 正确</b>：悲观假设冲突常发生→提前加锁（2PL）；乐观假设冲突少→先执行后验证。低冲突场景乐观更高效，高冲突则悲观更稳。", "new": true}];
const LABELS = {"L1": "第1章 · 数据库基础概念", "L2": "第2章 · 体系结构与分类", "L3": "第3章 · EER 与 UML 建模", "L4": "第4章 · 数据组织与关系模型", "L5": "第5章 · EER 到关系映射", "L6": "第6章 · SQL 基础", "L7": "第7章 · SQL 进阶", "L8DW": "第17章 · 数据仓库与 BI", "L8API": "第15章 · 数据库 API 与访问", "L9": "第18-20章 · 集成/OLAP/大数据", "L10": "第14章 · 事务管理与并发"};
const ORDER = ["L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8DW", "L8API", "L9", "L10"];
const SKEY = "dbm_fulldeck_v1";

let store = loadStore();
let state = { mode:"chapter", chapter:ORDER[0], quizIds:[], pos:0 };

/* ---- 持久化：localStorage + cookie 双写 ---- */
function setCookie(n,v,d){ var e=new Date(); e.setTime(e.getTime()+d*864e5); try{document.cookie=n+'='+encodeURIComponent(v)+';expires='+e.toUTCString()+';path=/;SameSite=Lax';}catch(_){} }
function getCookie(n){ try{var m=document.cookie.match('(?:^|; )'+n+'=([^;]*)'); return m?decodeURIComponent(m[1]):'';}catch(_){return '';} }
function loadStore(){
  try{ var ls=JSON.parse(localStorage.getItem(SKEY)); if(ls&&ls.ans) return ls; }catch(e){}
  var ck=getCookie(SKEY);
  if(ck){ var ans={}; ck.split(',').forEach(function(p){ if(!p)return; var a=p.split('-'); ans[a[0]]=+a[1]; }); return {ans:ans}; }
  return {ans:{}};
}
function saveStore(){
  try{ localStorage.setItem(SKEY, JSON.stringify(store)); }catch(e){}
  var ck=Object.keys(store.ans).map(function(k){ return k+'-'+store.ans[k]; }).join(',');
  setCookie(SKEY, ck, 180);
}

function fmt(t){ return (t||"").replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>'); }

function visibleIdx(){
  if(state.mode==="quiz") return state.quizIds;
  if(state.mode==="random") return state.randomIds;
  return QB.map((q,i)=>i).filter(i=>QB[i].ch===state.chapter);
}
function firstUnanswered(ids){ for(var k=0;k<ids.length;k++){ if(store.ans[ids[k]]===undefined) return k; } return 0; }

/* ---- 单题视图 ---- */
function render(){
  const ids = visibleIdx();
  if(state.pos<0) state.pos=0;
  if(state.pos>ids.length-1) state.pos=ids.length-1;
  const c = document.getElementById("qContainer");
  c.innerHTML="";
  const n=state.pos, id=ids[n], q=QB[id];
  const chosen=store.ans[id], done=chosen!==undefined;
  const div=document.createElement("div"); div.className="qblock"; div.dataset.id=id;
  const srcTag = q.new?'<span class="tag new">自编拔高</span>':'<span class="tag orig">原题 '+q.src.replace("原题 ","")+'</span>';
  let opts=q.opts.map((o,oi)=>{
    let cls="opt";
    if(done){ if(oi===q.ans)cls+=" correct"; else if(oi===chosen)cls+=" wrong"; }
    const ck=chosen===oi?"checked":""; const dis=done?"disabled":"";
    const letter=String.fromCharCode(65+oi);
    return '<label class="'+cls+'"><input type="radio" name="q'+id+'" '+ck+' '+dis+' onchange="choose('+id+','+oi+')"><span><b>'+letter+'.</b> '+fmt(o)+'</span></label>';
  }).join("");
  const expHtml = done? '<div class="exp show"><div class="exp-head">解析 EXPLANATION</div>'+q.exp+'</div>' : '<div class="exp"></div>';
  div.innerHTML='<div class="qmeta"><span class="tag">'+q.label+'</span>'+srcTag+'<span style="margin-left:auto">第 '+(n+1)+' / '+ids.length+' 题</span></div><div class="qtxt">'+fmt(q.q)+'</div><div class="opts">'+opts+'</div>'+expHtml;
  c.appendChild(div);

  // 导航：上一题 / 下一题（不自动跳转）
  const nav=document.createElement("div");
  nav.style.cssText="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px";
  const prevDis=n<=0?"disabled":"", nextDis=n>=ids.length-1?"disabled":"";
  nav.innerHTML='<button class="btn" id="prevBtn" '+prevDis+' style="flex:1">← 上一题</button>'+
    '<span style="color:var(--muted);font-size:13px;white-space:nowrap">'+(n+1)+' / '+ids.length+'</span>'+
    '<button class="btn primary" id="nextBtn" '+nextDis+' style="flex:1">下一题 →</button>';
  c.appendChild(nav);
  const pb=document.getElementById("prevBtn"), nb=document.getElementById("nextBtn");
  if(pb) pb.onclick=()=>{ state.pos--; render(); scrollTop(); };
  if(nb) nb.onclick=()=>{ state.pos++; render(); scrollTop(); };

  updateStats(); updateChapList(); updateProgress();
}
function scrollTop(){ const c=document.getElementById("qContainer"); window.scrollTo({top:Math.max(0,c.getBoundingClientRect().top+window.scrollY-70),behavior:"smooth"}); }

function choose(id,oi){
  if(store.ans[id]!==undefined) return;
  store.ans[id]=oi; saveStore();
  const q=QB[id];
  document.querySelectorAll('input[name="q'+id+'"]').forEach((inp,i)=>{
    inp.disabled=true; const l=inp.closest("label");
    if(i===q.ans)l.classList.add("correct"); else if(i===oi)l.classList.add("wrong");
  });
  const blk=document.querySelector('.qblock[data-id="'+id+'"]');
  const e=blk.querySelector(".exp");
  e.innerHTML='<div class="exp-head">解析 EXPLANATION</div>'+q.exp; e.classList.add("show");
  updateStats(); updateChapList(); updateProgress(); checkQuiz();
}

function updateStats(){
  let done=0,right=0;
  QB.forEach((q,i)=>{ if(store.ans[i]!==undefined){done++; if(store.ans[i]===q.ans)right++;} });
  document.getElementById("statTotal").textContent=QB.length;
  document.getElementById("statDone").textContent=done;
  document.getElementById("statRight").textContent=right;
  document.getElementById("statWrong").textContent=done-right;
  document.getElementById("statPct").textContent=done?Math.round(right/done*100)+"%":"—";
}

function updateChapList(){
  const cl=document.getElementById("chapList"); cl.innerHTML="";
  ORDER.forEach(ch=>{
    const ids=QB.map((q,i)=>i).filter(i=>QB[i].ch===ch);
    const done=ids.filter(i=>store.ans[i]!==undefined).length;
    const b=document.createElement("button");
    b.className="chap-btn"+(state.mode==="chapter"&&state.chapter===ch?" active":"");
    b.innerHTML='<span>'+LABELS[ch]+'</span><span class="badge'+(done===ids.length?' done':'')+'">'+done+'/'+ids.length+'</span>';
    b.onclick=()=>{ state.mode="chapter"; state.chapter=ch; state.pos=firstUnanswered(QB.map((q,i)=>i).filter(i=>QB[i].ch===ch)); document.getElementById("resultBox").classList.remove("show"); render(); window.scrollTo({top:0,behavior:"smooth"}); };
    cl.appendChild(b);
  });
}

function updateProgress(){
  const pw=document.getElementById("progWrap");
  const sb=document.getElementById("sectionBar");
  const ids=visibleIdx(); const done=ids.filter(i=>store.ans[i]!==undefined).length;
  const pct=Math.round(done/ids.length*100);
  pw.style.display="block";
  document.getElementById("progFill").style.width=pct+"%";
  if(state.mode==="quiz"){
    sb.style.display="none";
    document.getElementById("progText").textContent="模拟考试 · 已答 "+done+" / "+ids.length;
    document.getElementById("progPct").textContent=pct+"%";
  }else if(state.mode==="random"){
    sb.style.display="block";
    document.getElementById("secTitle").textContent="🔀 随机练习";
    document.getElementById("secHint").textContent="全题库 "+ids.length+" 题已乱序 · 已完成 "+done+" · 选完答案点「下一题」前进 · 再点工具栏「随机练习」可重新洗牌（不清除已答记录）";
    document.getElementById("progText").textContent="随机练习 · 已答 "+done+" / "+ids.length;
    document.getElementById("progPct").textContent=pct+"%";
  }else{
    sb.style.display="block";
    document.getElementById("secTitle").textContent=LABELS[state.chapter];
    const orig=ids.filter(i=>!QB[i].new).length;
    document.getElementById("secHint").textContent="共 "+ids.length+" 题（原题 "+orig+" + 自编 "+(ids.length-orig)+"）· 已完成 "+done+" · 选完答案点「下一题」前进，进度自动保存（localStorage + cookie）";
    document.getElementById("progText").textContent="本章进度 "+done+" / "+ids.length;
    document.getElementById("progPct").textContent=pct+"%";
  }
}

function checkQuiz(){
  if(state.mode!=="quiz") return;
  const all=state.quizIds.every(i=>store.ans[i]!==undefined);
  if(!all) return;
  let right=state.quizIds.filter(i=>store.ans[i]===QB[i].ans).length;
  const n=state.quizIds.length;
  const score=(right - (n-right)/3); const sc=Math.max(0,score/n*20).toFixed(2);
  document.getElementById("resultScore").textContent=sc+" / 20";
  document.getElementById("resultLabel").textContent="答对 "+right+" / "+n+" 题 · 按 -1/3 扣分制估算（原始分 "+score.toFixed(2)+"）";
  document.getElementById("resultBox").classList.add("show");
  document.getElementById("resultBox").scrollIntoView({behavior:"smooth",block:"start"});
}

function newQuiz(){
  const ids=QB.map((q,i)=>i).sort(()=>Math.random()-0.5).slice(0,30);
  ids.forEach(i=>{ delete store.ans[i]; }); saveStore();
  state.mode="quiz"; state.quizIds=ids; state.pos=0;
  document.getElementById("resultBox").classList.remove("show");
  render(); window.scrollTo({top:0,behavior:"smooth"});
}

function randomPractice(){
  state.mode="random";
  state.randomIds=QB.map((q,i)=>i).sort(()=>Math.random()-0.5);
  state.pos=0;
  document.getElementById("resultBox").classList.remove("show");
  render(); window.scrollTo({top:0,behavior:"smooth"});
}

document.getElementById("btnQuiz").onclick=newQuiz;
document.getElementById("btnRandom").onclick=randomPractice;
document.getElementById("btnResetChap").onclick=()=>{
  visibleIdx().forEach(i=>delete store.ans[i]); saveStore();
  state.pos=0; document.getElementById("resultBox").classList.remove("show"); render();
};
document.getElementById("btnResetAll").onclick=()=>{
  if(confirm("确定清空全部 220 题的作答进度？")){ store={ans:{}}; saveStore(); state.mode="chapter"; state.chapter=ORDER[0]; state.pos=0; document.getElementById("resultBox").classList.remove("show"); render(); }
};

state.pos=firstUnanswered(visibleIdx());
render();
</script>
</body>
</html>
