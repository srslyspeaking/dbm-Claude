<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>数据库管理 · 全题库精编版（含答案解析）</title>
<style>
:root{--ink:#1a2535;--muted:#5a6a7e;--line:#dce3ed;--paper:#f4f7fb;--panel:#fff;
--primary:#1a4fa0;--primary-d:#123880;--accent:#c75c1a;--good:#0f6b3e;--bad:#b01f1f;
--good-bg:#eef9f3;--bad-bg:#fdf1f1;--exp-bg:#f0f5ff;--shadow:0 2px 12px rgba(20,40,80,.09);}
*{box-sizing:border-box;margin:0;padding:0}
body{font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--paper)}
header{background:#0e1f38;color:#fff;border-bottom:4px solid var(--accent)}
.hdr-inner{max-width:1180px;margin:0 auto;padding:22px 20px 18px;display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap}
h1{font-size:clamp(20px,3.2vw,34px);line-height:1.12;letter-spacing:-.5px;flex:1}
h1 span{color:#7eb3f5;font-size:.5em;font-weight:500;display:block;margin-bottom:5px;letter-spacing:.5px}
.exam-tip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:10px 14px;font-size:12.5px;color:#c8d8ec;line-height:1.5;max-width:360px}
.exam-tip b{color:#f9c06a}
main{max-width:1180px;margin:0 auto;padding:18px 20px 50px;display:grid;grid-template-columns:262px 1fr;gap:16px;align-items:start}
.sidebar{position:sticky;top:12px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
.card-head{padding:11px 14px 9px;font-weight:700;font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--line)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid #f0f3f8}
.stat-row:last-child{border-bottom:0}
.stat-row span:first-child{color:var(--muted);font-size:13.5px}
.stat-row strong{font-size:17px;color:var(--primary)}
.chap-list{padding:7px 9px}
.chap-btn{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;padding:7px 10px;border:1px solid transparent;border-radius:7px;background:none;cursor:pointer;font:13.5px/1.3 inherit;color:var(--ink)}
.chap-btn:hover{background:#eef3fb}
.chap-btn.active{background:#e4eef9;border-color:#b8cfe8;color:var(--primary-d);font-weight:700}
.chap-btn .badge{font-size:11px;color:#fff;background:#9bb0c8;border-radius:99px;padding:1px 7px;white-space:nowrap}
.chap-btn .badge.done{background:var(--good)}
.content{display:flex;flex-direction:column;gap:14px}
.toolbar{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 14px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.btn{min-height:34px;padding:6px 13px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);font:600 13.5px/1 inherit;cursor:pointer}
.btn:hover{background:#f0f5fc}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-d)}
.sep{color:var(--line)}
.section-bar{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px}
.section-bar h2{font-size:18px;color:var(--primary-d)}
.section-bar .hint{color:var(--muted);font-size:13px;margin-top:3px}
.qblock{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;box-shadow:var(--shadow)}
.qmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-size:12px;color:var(--muted)}
.tag{display:inline-block;padding:2px 9px;border-radius:99px;background:#eef2f8;color:#445569;font-weight:600}
.tag.new{background:#fff4e5;color:#924d10}
.tag.orig{background:#e7f0fb;color:#1a4fa0}
.qtxt{font-size:15.5px;font-weight:700;margin-bottom:13px;line-height:1.55}
.opts{display:flex;flex-direction:column;gap:8px}
label.opt{display:grid;grid-template-columns:26px 1fr;gap:8px;align-items:start;padding:9px 11px;border:1.5px solid #e0e7f0;border-radius:8px;cursor:pointer;background:#fbfcfe;font-size:14px;line-height:1.5}
label.opt:hover{border-color:#9ab5d8}
label.opt.correct{border-color:#3da06e;background:var(--good-bg)}
label.opt.wrong{border-color:#d9534f;background:var(--bad-bg)}
input[type=radio]{margin-top:3px;accent-color:var(--primary)}
.exp{margin-top:12px;padding:12px 14px;border-radius:8px;background:var(--exp-bg);border-left:4px solid var(--primary);display:none;font-size:13.5px;line-height:1.7}
.exp.show{display:block}
.exp-head{font-weight:700;color:var(--primary);margin-bottom:5px;font-size:12.5px;letter-spacing:.4px}
.result-box{display:none;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;text-align:center}
.result-box.show{display:block}
.result-score{font-size:38px;font-weight:900;color:var(--primary-d);line-height:1}
.result-label{color:var(--muted);margin-top:6px}
.prog-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.prog-label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px}
.prog-track{height:8px;border-radius:99px;background:#dde5ef;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);width:0;transition:width .3s}
code{font-family:"Courier New",monospace;background:#e8edf5;padding:1px 5px;border-radius:4px;font-size:.88em;white-space:pre-wrap}
/* ── 平板/移动端 ── */
@media(max-width:860px){
  main{grid-template-columns:1fr;gap:12px;padding:12px 12px 40px}
  .sidebar{position:static;flex-direction:column;gap:10px}
  /* 统计变成横向小条 */
  #statRows{display:flex;flex-wrap:wrap;gap:0}
  .stat-row{flex:1 1 33%;flex-direction:column;align-items:flex-start;gap:1px;border-bottom:0;border-right:1px solid #f0f3f8;padding:8px 12px}
  .stat-row span:first-child{font-size:12px}
  .stat-row strong{font-size:16px}
  /* 章节横向滚动 */
  .chap-list{display:flex;overflow-x:auto;gap:7px;padding:9px;-webkit-overflow-scrolling:touch}
  .chap-btn{flex:0 0 auto;white-space:nowrap;border:1px solid var(--line)}
  .chap-btn>span:first-child{font-size:13px}
  .toolbar{position:sticky;top:0;z-index:5}
}
/* ── 手机 ── */
@media(max-width:560px){
  .hdr-inner{padding:14px 14px 12px;gap:10px;flex-direction:column;align-items:stretch}
  h1{font-size:21px}
  h1 span{font-size:11px}
  .exam-tip{max-width:none;font-size:11.5px;padding:9px 11px}
  main{padding:10px 10px 36px}
  .toolbar{padding:9px 10px;gap:7px}
  .toolbar .btn{flex:1 1 auto;text-align:center;padding:9px 10px;min-height:40px}
  .toolbar .sep{display:none}
  .qblock{padding:13px}
  .qmeta{font-size:11px;gap:6px}
  .qtxt{font-size:15.5px}
  label.opt{font-size:14.5px;padding:11px 12px;min-height:46px;grid-template-columns:22px 1fr;gap:7px}
  input[type=radio]{width:18px;height:18px}
  .exp{font-size:13.5px;padding:11px 12px}
  .result-score{font-size:30px}
  .section-bar{padding:11px 13px}
  .section-bar h2{font-size:16px}
  code{font-size:.9em;word-break:break-word}
  .card-head{font-size:12px}
}
</style>
</head>
<body>
<header><div class="hdr-inner">
<h1><span>KU Leuven · Database Management</span>全题库精编版 · 220 题含答案解析</h1>
<div class="exam-tip"><b>考试</b>：30 单选题（4选1）·错题 <b>-1/3</b>·3 小时·理论/练习≈<b>60/40</b>。原题逐题附中文解析；每章 20 题（原题 + 自编拔高题）。<br><b>进度自动保存</b>在本机浏览器。</div>
</div></header>
<main>
<div class="sidebar">
<div class="card"><div class="card-head">答题统计（全部）</div><div id="statRows">
<div class="stat-row"><span>题目总数</span><strong id="statTotal">0</strong></div>
<div class="stat-row"><span>已作答</span><strong id="statDone">0</strong></div>
<div class="stat-row"><span>答对</span><strong id="statRight" style="color:var(--good)">0</strong></div>
<div class="stat-row"><span>答错</span><strong id="statWrong" style="color:var(--bad)">0</strong></div>
<div class="stat-row"><span>正确率</span><strong id="statPct">—</strong></div>
</div></div>
<div class="card"><div class="card-head">章节（点击进入）</div><div class="chap-list" id="chapList"></div></div>
</div>
<div class="content">
<div class="toolbar">
<button class="btn primary" id="btnQuiz">🎲 模拟考试（随机30题）</button>
<button class="btn" id="btnRandom">🔀 随机练习（全题库乱序）</button>
<span class="sep">|</span>
<button class="btn" id="btnResetChap">重置本章</button>
<button class="btn" id="btnResetAll">清空全部进度</button>
</div>
<div id="resultBox" class="result-box">
<div class="result-score" id="resultScore"></div>
<div class="result-label" id="resultLabel"></div>
<button class="btn primary" style="margin-top:14px" onclick="newQuiz()">再来一套</button>
</div>
<div class="prog-wrap" id="progWrap" style="display:none">
<div class="prog-label"><span id="progText"></span><span id="progPct"></span></div>
<div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
</div>
<div class="section-bar" id="sectionBar"><h2 id="secTitle"></h2><div class="hint" id="secHint"></div></div>
<div id="qContainer"></div>
</div>
</main>
<script>
const QB = [{"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 1", "q": "Which statement is NOT CORRECT?", "opts": ["The file approach to data management causes the same information to be stored separately for different applications.", "In a file approach to data management, the data definitions are included in each application separately.", "In a file approach to data management, different applications could be using older and newer versions of the same data.", "In a file approach to data management, a change in the structure of a data file is easily handled because each application has its own data files."], "ans": 3, "exp": "✅ <b>D 错误（即答案）</b>：文件方式下数据与程序强耦合，文件结构一变，所有读取它的程序都要改，绝不“容易处理“。A/B/C 都是文件方式的真实缺陷。💡 文件方式 = 数据独立性为零。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 2", "q": "Which statement is NOT CORRECT?", "opts": ["In a database approach, applications don’t have their own files, but all applications access the same version of the data by interfacing with the DBMS.", "In a database approach, the data definitions or metadata are stored in the applications accessing the data.", "In a database approach, there is typically less storage needed compared to the file approach.", "In a database approach, maintenance of data and metadata is easier."], "ans": 1, "exp": "✅ <b>B 错误</b>：数据库方式把元数据集中存放在<b>目录（catalog / data dictionary）</b>中，而非分散在各应用程序里。这正是数据库方式相对文件方式的关键改进。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 3", "q": "Which of the following statements is NOT CORRECT?", "opts": ["A file-based approach to data management will easily lead to inconsistent data.", "A file-based approach to data management facilitates concurrency control.", "A file-based approach to data management incurs a strong dependency between the applications and the data", "A file-based approach to data management causes duplicate information, which leads to a waste of storage resources."], "ans": 1, "exp": "✅ <b>B 错误</b>：文件系统没有内置并发控制，多个程序同时写会产生丢失更新。并发控制是 DBMS 的核心优势，不是文件方式的特性。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 4", "q": "Which statement is NOT CORRECT?", "opts": ["In a file-based approach, every application had its own query and access procedures, even if they wanted to access the same data.", "SQL is a database language to manage DBMSs without having to write a substantial amount of programming code.", "SQL is a database language that focusses on how to access and retrieve the data.", "SQL is a database language that allows different applications to access different subsets of the data necessary for each application."], "ans": 2, "exp": "✅ <b>C 错误</b>：SQL 是<b>声明式（declarative）</b>语言，描述“查什么（WHAT）“，而非“怎么查（HOW）“。HOW 由查询优化器决定。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 5", "q": "Which of the following statements is correct?", "opts": ["It is more cumbersome to query a database system than a file-based system.", "The file-based approach uses metadata to define the data. These definitions are then stored in a catalog.", "A database approach to data management uses the available storage in a more efficient manner.", "The maintenance of a file-based system is much easier than the maintenance of a database system."], "ans": 2, "exp": "✅ <b>C 正确</b>：数据库方式消除冗余、集中管理，存储利用率更高。A/D 错（DBMS 查询更简洁、维护更系统）；B 错（catalog 是 DBMS 的特征，文件方式的定义在程序里）。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 6", "q": "Which statement is NOT CORRECT?", "opts": ["In a conceptual data model, the data requirements from the business should be captured and modeled.", "A conceptual data model is implementation dependent.", "A logical data model translates the conceptual data model to a specific implementation environment.", "Examples of implementations of logical data models are hierarchical, CODASYL, relational or object-oriented models."], "ans": 1, "exp": "✅ <b>B 错误</b>：概念数据模型（如 ER 图）是<b>实现无关</b>的，只描述业务需求。实现相关的是逻辑/内部模型。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 7", "q": "Which of the following statements is correct?", "opts": ["To communicate with the business user, mainly the logical data model is used.", "A database state contains the description of the database data and is stored in the catalog.", "The logical data model is implementation independent.", "The internal data model represents the data’s physical storage details."], "ans": 3, "exp": "✅ <b>D 正确</b>：内部数据模型描述物理存储细节（文件组织、索引）。A 错（业务沟通用概念模型）；B 错（catalog 存的是 schema 不是 state）；C 错（实现无关的是概念模型）。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 8", "q": "Complete the following sentence, choosing the right words on place A and B. A …A… data model is the mapping of a …B… data model to a model that describes which data is stored where and in what format.", "opts": ["A: internal, B: logical", "A: conceptual, B: internal", "A: logical, B: internal", "A: logical, B: conceptual"], "ans": 0, "exp": "✅ <b>A 正确</b>：内部（internal）数据模型 = 逻辑（logical）数据模型到“数据存在哪、什么格式“的映射。即 internal 是 logical 的物理映射。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 9", "q": "What concept specifies the various data items, their characteristics and relationships, constraints, storage details, etc. and is specified during the database design?", "opts": ["Database model", "Catalog", "Database state", "None of the above"], "ans": 0, "exp": "✅ <b>A 正确</b>：数据库模型（database model / schema）在设计期指定数据项、特征、关系、约束、存储细节等。catalog 是存放它的地方；database state 是某时刻的数据内容。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 10", "q": "Which statement is right about the database state?", "opts": ["The database state represents the data in the database when the database is first created.", "The database state changes when data is updated or removed.", "The database state specifies the various data items, their characteristics and relationships and is specified during the database design.", "The database state is stored in the catalog."], "ans": 1, "exp": "✅ <b>B 正确</b>：数据库<b>状态（state）</b>随数据增删改而变化（动态）。A 错（那只是初始状态）；C 错（描述的是 schema）；D 错（catalog 存 schema 不存 state）。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 11", "q": "Which of the following statements is NOT CORRECT?", "opts": ["The external layer of a database contains the logical and conceptual data model.", "Changes in any of the layers in the three-layer architecture should minimally impact the other layers.", "The internal data model is situated in the internal layer.", "Views can be defined for a particular application or a user group. This facilitates control of data access and security."], "ans": 0, "exp": "✅ <b>A 错误</b>：外层（external layer）包含的是<b>视图（views）</b>，不是逻辑/概念模型。逻辑/概念模型在中间层，内部模型在内层。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 12", "q": "Complete this sentence: In the three-layer architecture, between the external layer and the conceptual/logical layer, there is …", "opts": ["Physical data independence", "Logical data independence", "No independence, they are basically the same thing", "The internal layer"], "ans": 1, "exp": "✅ <b>B 正确</b>：外层↔概念/逻辑层之间是<b>逻辑数据独立性</b>；概念/逻辑层↔内层之间是<b>物理数据独立性</b>。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 13", "q": "Which of the following statements is NOT CORRECT?", "opts": ["To cater for data independence, interfaces between the three layers of the database architecture should be provided.", "Physical data independence means that changes in the data storage specifications should not impact the applications, the defined views nor the logical data model.", "Logical data independence means that changes in the logical or conceptual data model should not impact the data storage specifications.", "Only structured data can be described in a formal logical data model."], "ans": 2, "exp": "✅ <b>C 错误</b>：方向反了。逻辑数据独立性是“逻辑/概念模型变化不影响上层应用/视图“。“逻辑层变化不影响存储规范“不是逻辑独立性的定义。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 14", "q": "Statement A: The middle layer of the three-layer architecture consists of both the conceptual data model and the logical data model. The logical data model is physically implemented in the internal layer. Statement B: The top level of the three-layer architecture is the external layer. Views for one or more applications always offer a window on the complete logical model.", "opts": ["Only sentence A is right", "Only sentence B is right", "Sentence A and B are right", "Neither A or B is right"], "ans": 0, "exp": "✅ <b>A 正确（仅 A 对）</b>：A 对——中间层含概念+逻辑模型，逻辑模型在内层物理实现。B 错——视图通常只提供完整逻辑模型的<b>一个窗口/子集</b>，并非“完整逻辑模型“。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 15", "q": "Statement A: DDL is the language used to define the logical data model, but no other data models. Statement B: SQL is a DML language to retrieve, insert, delete and modify data. It is stored in the catalog. Which sentence(s) is/are right?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 3, "exp": "✅ <b>D 正确（A、B 都错）</b>：A 错——DDL 不仅定义逻辑模型，也用于外部和内部模型。B 错——SQL 同时含 DDL 和 DML，且 DML 语句本身不“存储在 catalog 中“。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 16", "q": "Statement A: Physical data independence implies that neither the applications, nor the views or logical data model must be changed when changes are made to the data storage specifications in the internal data model. Statement B: Logical data independence implies that software applications are minimally affected by changes in the conceptual or logical data model. Which sentence(s) is/are right?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 2, "exp": "✅ <b>C 正确（A、B 都对）</b>：A 正确定义物理数据独立性（存储规范变化不影响应用/视图/逻辑模型）；B 正确定义逻辑数据独立性（概念/逻辑模型变化对应用影响最小）。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 17", "q": "Which of the following statements is NOT CORRECT", "opts": ["The three KPIs of a DBMS are response time, throughput rate and space utilization.", "The response time is the time needed to build the conceptual data model.", "The throughput rate is the number of transactions a DBMS can process per unit of time.", "Space utilization is the space utilized to store raw data and metadata."], "ans": 1, "exp": "✅ <b>B 错误</b>：响应时间（response time）= 处理一个查询/事务返回结果的时间，与“构建概念模型“无关。三 KPI：响应时间、吞吐率、空间利用率。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "原题 MC 19", "q": "Statement i is correct, but statement ii is not correct. Statement ii is correct but statement i is not correct. Both statements are not correct. Which of the following statements is NOT CORRECT?", "opts": ["ACID stands for Availability, Consistency, Isolation and Durability.", "Durability means that effects of each successful transaction can be made permanent.", "Consistency assures that the database is consistent at all times.", "Isolation ensures that the effect of concurrent transactions should be the same as if they had been executed in isolation."], "ans": 0, "exp": "✅ <b>A 错误</b>：ACID 中 A = <b>Atomicity（原子性）</b>，不是 Availability。Availability 是 CAP 定理的概念。⚠️ 经典陷阱：把 Atomicity 误写成 Availability。", "new": false}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "自编", "q": "【自编题】下表是两个并发事务对余额 Balance(初值 $2000) 的操作：t2 时 T1 和 T2 都 Read=2000；t3 T1 写 3000；t4 T2 写 12000；之后双双提交。最终 Balance 及问题类型？", "opts": ["最终 13000；脏读（dirty read）", "最终 12000；丢失更新（lost update）——T2 覆盖了 T1 已提交的写", "最终 3000；不可重复读", "最终 15000；ACID 保证两次更新都生效"], "ans": 1, "exp": "✅ <b>B 正确</b>：经典<b>丢失更新</b>：两事务都基于初值 2000 计算后各自写入，T2 最后写 12000 覆盖了 T1 的 3000，期望值 13000 丢失。💡 解决：对 Balance 加排他锁，使 T2 必须等 T1 提交后再读（读到 3000）→ 结果 13000。", "new": true}, {"ch": "L1", "label": "第1章 · 数据库基础概念", "src": "自编", "q": "【自编题】下列哪一项最准确地区分 schema（模式）与 state（状态）/ instance（实例）？", "opts": ["schema 频繁变化，state 几乎不变", "schema 是数据的结构定义（intension，存于 catalog），state 是某时刻的实际数据内容（extension）", "schema 和 state 是同义词", "state 在设计期定义，schema 在运行期产生"], "ans": 1, "exp": "✅ <b>B 正确</b>：schema（intension）= 结构定义，存于 catalog，很少变；state/instance（extension）= 某时刻实际数据，随增删改频繁变化。D 把两者关系完全说反。", "new": true}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 1", "q": "Which of these is part of the Query Processor in the DBMS Architecture?", "opts": ["DDL compiler", "DML compiler", "Transaction Manager", "Security Manager"], "ans": 1, "exp": "✅ <b>B 正确</b>：DML compiler 属于查询处理器（Query Processor）。Transaction/Security Manager 属于存储/安全层。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 2", "q": "Which of these is NOT a part of the Storage Manager in the DBMS Architecture?", "opts": ["Connection Manager", "Transaction Manager", "Buffer Manager", "Recovery Manager"], "ans": 0, "exp": "✅ <b>A 正确（不属于）</b>：Connection Manager 处理客户端连接，属于网络/查询层，不在 Storage Manager 内。Storage Manager 含 Transaction/Lock/Recovery/Buffer/File Manager。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 3", "q": "Statement A: The DDL compiler compiles data definitions specified in DDL. It is possible that there is only 1 DDL with 3 instruction sets. Statement B: The first step of the DDL compiler is to translate the DDL definitions. Which statement(s) is/are CORRECT?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 0, "exp": "✅ <b>A 正确（仅 A 对）</b>：一个 DDL 可含 3 套指令集（定义外部/概念/内部模型）。B 错——DDL 编译第一步是<b>语法分析（parse）</b>，不是直接“翻译定义“。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 4", "q": "Statement A: There is no query processor available in procedural DML.Statement B: With procedural DML, the DBMS determines the access path and navigational strategy to locate and modify the data specified in the query. Which statement(s) is/are CORRECT?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 0, "exp": "✅ <b>A 正确（仅 A 对）</b>：过程式 DML 中程序员自己指定访问路径，<b>没有查询处理器</b>。B 错——“DBMS 自动决定访问路径“是<b>声明式</b> DML 的特征。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 5", "q": "Evaluate the following statements: Record-at-a-time DML means that the query gets recorded from the user at the time the user inputs the query and then gets processed. Record-at-a-time DML means that navigating the database starts with positioning on one specific record and going from there onwards to other records. Set-at-a-time DML means that the query gets set beforehand and then gets processed by the DBMS. Set-at-a-time DML means that many records can be retrieved in one DML statement. Which statements are CORRECT?", "opts": ["1 and 3 are right", "2 and 3 are right", "1 and 4 are right", "2 and 4 are right"], "ans": 3, "exp": "✅ <b>D（2 和 4）正确</b>：Record-at-a-time = 从一条记录出发逐步导航（CODASYL）；Set-at-a-time = 一条语句返回记录集合（SQL）。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 6", "q": "Statement A: The impedance mismatch problem can be solved by using middleware to map data structures between the DBMS and the DDL statements. Statement B: An object-oriented host language such as Java combined with a document-oriented DBMS such as MongoDB does not require mapping objects to documents and vice versa. Which statement(s) is/are CORRECT?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 3, "exp": "✅ <b>D（都错）</b>：A 错——中间件映射的是 DBMS 与<b>宿主程序语言</b>的数据结构，不是“DDL 语句“。B 错——Java 对象与 MongoDB 文档之间<b>仍需</b>映射（impedance mismatch 依然存在）。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 7", "q": "Statement A: The Query Parser optimizes and simplifies a query and then passes it on to the Query Executor. Statement B: In the DBMS architecture, the Storage Manager takes care of concurrency control. Which statement(s) is/are CORRECT?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 1, "exp": "✅ <b>B 正确（仅 B 对）</b>：A 错——优化/简化查询的是 Query <b>Optimizer</b>，不是 Parser（Parser 只做语法分析）。B 对——并发控制由 Storage Manager 负责。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 8", "q": "Fill in the following sentences: When during crash recovery, aborted transactions need to be undone, that is a task of the …A… The part of the Storage manager that guarantees the ACID properties is the …B…", "opts": ["A: Lock manager, B: Recovery manager", "A: Lock manager, B: Lock manager", "A: Recovery manager, B: Buffer manager", "A: Recovery manager, B: Transaction manager"], "ans": 3, "exp": "✅ <b>D 正确</b>：崩溃恢复撤销中止事务 → <b>Recovery Manager</b>；保证 ACID → <b>Transaction Manager</b>。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 9", "q": "CODASYL is an example of…", "opts": ["a Hierarchical DBMS", "a Network DBMS", "a Relational DBMS", "an Object-Oriented DBMS"], "ans": 1, "exp": "✅ <b>B 正确</b>：CODASYL 定义的是<b>网状（Network）</b>数据库标准。历史：层次→网状（CODASYL）→关系→对象/NoSQL。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 10", "q": "Which of the following DBMS types is NOT a classification based on a data model?", "opts": ["Hierarchical DBMS", "Network DBMS", "Cloud DBMS", "Object-Relational DBMS"], "ans": 2, "exp": "✅ <b>C 正确（不是按数据模型分类）</b>：Cloud DBMS 是按<b>部署方式</b>分类。层次/网状/对象关系都是按数据模型分类。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 11", "q": "Statement A: In a Hierarchical DBMS, DML is declarative and set oriented with a query processor. Statement B: In a relational DBMS, there is data independence between the logical and internal data model. Which statement(s) is/are CORRECT?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 1, "exp": "✅ <b>B 正确（仅 B 对）</b>：A 错——层次 DBMS 的 DML 是<b>过程式、record-at-a-time</b>，无查询处理器。B 对——关系 DBMS 在逻辑层与内部层间有数据独立性。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 12", "q": "If you want to use a DBMS architecture that can access multiple data sources itself and provides a uniform interface hiding the low-level details, the most appropriate DBMS would be a…", "opts": ["n-tier DBMS", "Cloud DBMS", "Client-Server DBMS", "Federated DBMS"], "ans": 3, "exp": "✅ <b>D 正确</b>：<b>联邦 DBMS（Federated）</b>= 访问多个异构数据源 + 提供统一透明接口。关键词：多源异构 + 统一接口。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 13", "q": "Statement A: An OLTP system is able to cope with real-time, simultaneous transactions which the database server is able to process in a huge volume. Statement B: An OLAP system uses large amounts of operational data to run complex queries on and provide insights for tactical and strategical decision making. Which statement(s) is/are correct?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 2, "exp": "✅ <b>C 正确（都对）</b>：OLTP = 高并发实时短事务；OLAP = 复杂分析查询支持战术/战略决策。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 14", "q": "Statement A: Native XML DBMSs map the hierarchical structure of an XML document to a physical storage structure, because they are able to use the intrinsic structure of an XML document. Statement B: XML-enabled DBMSs are able to store XML data in an integrated and transparent way, because they are able to use the intrinsic structure of an XML document. Which statement(s) is/are correct?", "opts": ["Only A", "Only B", "A and B", "Neither A or B"], "ans": 0, "exp": "✅ <b>A 正确（仅 A 对）</b>：Native XML DBMS 利用 XML 内在层次结构映射到物理存储。B 错——XML-enabled DBMS 是在关系库上“附加“XML 支持，并非真正利用内在结构透明存储。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "原题 MC 15", "q": "Which of the following statements about the ER model is CORRECT? An entity represents a set of entity types with similar properties.", "opts": ["One of the strengths of the ER model is that temporal constraints can be modelled.", "A weak entity type cannot have a key attribute type of its own. Therefore, a weak entity type borrows an attribute type of its owner entity type.", "The ER model allows to enforce consistency across multiple relationship types.", "[Image / 图片]"], "ans": 1, "exp": "✅ <b>B 正确</b>：<b>弱实体类型</b>没有自己的键，需借用所有者实体的键 + 自己的部分键。A 错（时态约束是 ER 的弱点）；C 错（ER 不能跨关系强制一致性）。", "new": false}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "自编", "q": "【自编题】查询处理器处理一条 SQL 的正确顺序是？", "opts": ["Executor → Optimizer → Parser", "Parser（语法分析）→ Optimizer（优化生成执行计划）→ Executor（执行）", "Optimizer → Parser → Executor", "Compiler → Buffer Manager → Lock Manager"], "ans": 1, "exp": "✅ <b>B 正确</b>：SQL 先经 Query <b>Parser</b>（语法/语义检查）→ Query <b>Optimizer</b>（生成最优执行计划）→ Query <b>Executor</b>（执行计划访问数据）。", "new": true}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "自编", "q": "【自编题】关于 impedance mismatch（阻抗失配）问题，下列说法正确的是？", "opts": ["它指 CPU 与磁盘速度不匹配", "它指面向集合的 SQL（set-at-a-time）与面向记录的宿主语言（record-at-a-time）之间的范式不匹配，需要游标或 ORM 映射", "它只在 NoSQL 数据库中出现", "它由网络延迟造成"], "ans": 1, "exp": "✅ <b>B 正确</b>：阻抗失配 = 声明式集合处理的 SQL 与命令式逐记录处理的宿主语言（C/Java）之间的范式差异，需游标（cursor）或对象-关系映射（ORM）来桥接。", "new": true}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "自编", "q": "【自编题】下列关于 OLTP 与 OLAP 的对比，哪一项<b>错误</b>？", "opts": ["OLTP 面向当前数据、频繁读写、短事务", "OLAP 面向历史数据、复杂只读查询、支持决策", "OLTP 通常用规范化模式，OLAP 常用星型/雪花模式", "OLAP 比 OLTP 更适合高并发的单行更新"], "ans": 3, "exp": "✅ <b>D 错误</b>：高并发单行更新是 <b>OLTP</b> 的强项；OLAP 主要做大批量只读聚合分析。其余三项都是 OLTP/OLAP 的正确特征对比。", "new": true}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "自编", "q": "【自编题】三层 client-server 架构（presentation/application/data）相比集中式的主要优点是？", "opts": ["完全消除了网络通信", "解耦表示、应用、数据三层，便于独立扩展、维护和复用，并提升安全性", "使数据库不再需要并发控制", "让所有逻辑回到单一主机执行"], "ans": 1, "exp": "✅ <b>B 正确</b>：分层解耦 → 各层可独立扩展/维护/复用，应用服务器可加安全层。A/D 与分层目的相反；C 与事务/并发无关。", "new": true}, {"ch": "L2", "label": "第2章 · 体系结构与分类", "src": "自编", "q": "【自编题】下列哪种 DBMS 最适合“将数据和计算分布到多台机器、按需弹性伸缩、按使用付费“的场景？", "opts": ["层次型 DBMS", "Cloud DBMS（云数据库）", "嵌入式 DBMS", "单机集中式 DBMS"], "ans": 1, "exp": "✅ <b>B 正确</b>：Cloud DBMS 将存储/计算分布到多机，提供弹性伸缩与按需付费。其余选项都不具备弹性分布特性。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "原题 MC 5", "q": "Which one of the following is an example of a DISJOINT and PARTIAL specialisation?", "opts": ["HUMAN VEGETARIAN + NON-VEGETARIAN", "HUMAN BLONDE + BRUNETTE", "HUMAN LOVES FISH + LOVES MEAT", "HUMAN UNIVERSITY DEGREE + COLLEGE DEGREE"], "ans": 1, "exp": "✅ <b>B 正确</b>：Disjoint（不相交）= 一个实例最多属于一个子类；Partial（部分）= 超类实例可不属于任何子类。“金发/棕发“既互斥（disjoint）又不覆盖全部人（partial，还有黑发等）。A（素食/非素食）是 total；C（爱鱼/爱肉）overlapping。", "new": false}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "原题 MC 6", "q": "Which of the following statements is CORRECT?", "opts": ["An aggregation cannot have attribute types.", "An aggregation cannot participate in a relationship type.", "An aggregation should have both attribute types and participate in one or more relationship types.", "An aggregation can have attribute types and participate in relationship types."], "ans": 3, "exp": "✅ <b>D 正确</b>：EER 聚合（aggregation）= 把一个联系类型当作高阶实体，它<b>既可以有属性，也可以参与其他联系</b>。A/B 错（两者都可以）；C 错（不是“必须都有“）。", "new": false}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "原题 MC 8", "q": "Which statement is CORRECT?", "opts": ["A class is an instance of an object.", "A class only has variables.", "Inheritance is not supported in Object-Orientation.", "Information hiding (also referred to as encapsulation) states that the variables of an object can only be accessed through either getter or setter methods."], "ans": 3, "exp": "✅ <b>D 正确</b>：信息隐藏/封装 = 对象的变量只能通过 getter/setter 方法访问。A 错（对象是类的实例，反了）；B 错（类含变量+方法）；C 错（OO 支持继承）。", "new": false}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "原题 MC 9", "q": "Which variables types are not directly supported in UML?", "opts": ["Composite variables", "Multivalued variables", "Variables with unique values (similar to key attribute types in the ER model)", "Derived variables"], "ans": 2, "exp": "✅ <b>C 正确（不直接支持）</b>：UML 不像 ER 那样直接支持“唯一值键属性“概念（用限定关联或 OCL 间接表达）。复合、多值、派生变量 UML 都支持。", "new": false}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "原题 MC 10", "q": "Which of the following statements is NOT CORRECT?", "opts": ["In UML, access modifiers can be used to specify who can have access to a variable or method.", "A private access modifier (denoted by the symbol ‘–‘) is used in case the variable or method can only be accessed by the class itself.", "A public access modifier (denoted by the symbol ‘+’) is used in case the variable or method can be accessed by any other class.", "A protected access modifier (denoted by the symbol ‘#’) is used in case the variable or method can be accessed by both the class and its superclasses."], "ans": 3, "exp": "✅ <b>D 错误</b>：protected（#）= 类自身及其<b>子类</b>可访问，而非“超类“。+public 任意类可访问；-private 仅本类。", "new": false}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "原题 MC 12", "q": "Which statement is CORRECT?", "opts": ["An association is an instance of a link.", "Only binary associations are supported in the UML class diagram.", "An association is always bidirectional.", "Qualified associations can be used to represent weak entity types."], "ans": 3, "exp": "✅ <b>D 正确</b>：限定关联（qualified association）可表示弱实体类型（用限定符 + owner 唯一标识）。A 错（link 是 association 的实例，反了）；B 错（UML 支持 n 元关联）；C 错（关联可单向）。", "new": false}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "原题 MC 13", "q": "A composite aggregation", "opts": ["has a maximum multiplicity of 1 and a minimum multiplicity of 0 or 1 at the composite side.", "has a maximum multiplicity of n and a minimum multiplicity of 0 at the composite side.", "has a maximum multiplicity of n and a minimum multiplicity of 0 or 1 at the composite side.", "has a maximum multiplicity of 1 and a minimum multiplicity of 1 at the composite side."], "ans": 0, "exp": "✅ <b>A 正确</b>：复合聚合（composite aggregation）在组合端最大多重性 = 1（部分最多属于一个整体），最小 0 或 1。即一个 part 不能被多个 whole 共享。", "new": false}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "原题 MC 15", "q": "Which statement is NOT CORRECT?", "opts": ["The changeability property specifies the type of operations which are allowed on either variable values or links.", "OCL constraints are defined in a procedural way.", "OCL constraints can be used for various purposes such as, to specify invariants for classes, to specify pre- and post-conditions for methods, to navigate between classes, or to define constraints on operations.", "In UML, dependency defines a ‘using’ relationship which states that a change in the specification of a UML modeling concept may affect another modeling concept that uses it."], "ans": 1, "exp": "✅ <b>B 错误</b>：OCL 约束是<b>声明式（declarative）</b>定义的，不是过程式。OCL 可表达不变量、前后置条件等，弥补 UML 图形的表达局限。", "new": false}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】弱实体类型（weak entity type）与存在依赖实体类型（existence-dependent）的关系是？", "opts": ["两者完全等价", "弱实体一定存在依赖；但存在依赖不一定是弱实体（它可能有自己的键）", "存在依赖一定是弱实体；弱实体不一定存在依赖", "两者都必须参与 1:1 联系"], "ans": 1, "exp": "✅ <b>B 正确</b>：弱实体（无自身键）⊂ 存在依赖；但存在依赖实体可以有自己的键（非弱实体）。⚠️ 常见陷阱：误以为存在依赖 = 弱实体。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】用三个二元联系替代一个三元联系类型的主要风险是？", "opts": ["存储一定不可能", "语义可能丢失——无法表达三方的组合约束", "会自动删除所有主键", "会强制生成 XML"], "ans": 1, "exp": "✅ <b>B 正确（考试重点）</b>：三元联系表达三方组合（如供应商-项目-零件的具体供应记录），拆成三个二元后这种组合信息丢失。三元联系也可有属性。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】UML 中的聚合（aggregation）与 EER 中的聚合（aggregation）区别是？", "opts": ["完全相同可互换", "UML 聚合是类间整体-部分结构关系；EER 聚合是把一个联系类型当作高阶实体使其能参与更高阶联系", "UML 聚合强制排他所有权，EER 聚合允许共享", "两者都用来表示弱实体"], "ans": 1, "exp": "✅ <b>B 正确</b>：同名但语义不同。UML aggregation = 整体-部分；EER aggregation = 联系升格为实体参与更高阶联系。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】OCL（Object Constraint Language）的主要用途是？", "opts": ["生成物理存储 DDL", "以声明式补充 UML，表达图形无法直接表达的约束（不变量、前后置条件等）", "只能运行时验证，不能用于设计", "与 EER 完全等价"], "ans": 1, "exp": "✅ <b>B 正确（考试重点）</b>：OCL 声明式表达 UML 难以表达的约束，例如 <code>context Lecturer inv: self.teaches->size()&lt;=3</code>。弥补 UML 图形的局限。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】specialization（特化）的两对正交约束是？", "opts": ["disjoint/overlapping 与 total/partial", "mandatory/optional 与 weak/strong", "1:1 与 M:N", "static/dynamic 与 public/private"], "ans": 0, "exp": "✅ <b>A 正确</b>：不相交性（disjoint 子类互斥 vs overlapping 可多属）与完全性（total 必属至少一子类 vs partial 可不属）。两对正交，组合出 4 种特化。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】categorization（类别化/category）与 specialization（特化）的本质区别是？", "opts": ["两者没有区别", "category 的子类（category）的超类有<b>多个不同</b>的实体类型（如 Person 或 Company → Account-holder）；specialization 只有一个超类", "category 不能有属性", "specialization 不允许继承"], "ans": 1, "exp": "✅ <b>B 正确</b>：Categorization = 一个子类继承自<b>多个异构超类</b>的并集（如账户持有人可来自 Person 或 Company）；specialization = 单一超类向下细分。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】UML 中 -、+、# 三个访问修饰符分别表示？", "opts": ["- 公有；+ 私有；# 受保护", "- 私有（仅本类）；+ 公有（任意类）；# 受保护（本类及子类）", "- 受保护；+ 私有；# 公有", "三者含义相同"], "ans": 1, "exp": "✅ <b>B 正确</b>：<code>-</code>=private（仅本类）；<code>+</code>=public（任意类）；<code>#</code>=protected（本类及其子类）。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】复合聚合（composite aggregation，实心菱形）在组合端的多重性约束是？", "opts": ["最大 1（部分至多属于一个整体），删整体则部分一同删除", "最大 N，部分可被多个整体共享", "最小必为 1", "组合与部分生命周期无关"], "ans": 0, "exp": "✅ <b>A 正确</b>：复合聚合（composition）= 强所有权：部分至多属于一个整体（组合端 max=1），整体删除时部分级联删除。共享聚合（空心菱形）才允许共享。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】下列哪项<b>不是</b> ER/EER 模型的固有局限？", "opts": ["无法表达时态约束（如“会议须在课程创建后6个月内“）", "无法跨联系类型强制一致性", "无法表达实体间的联系", "无法直接表达“最多5个“这类具体数值上限的语义"], "ans": 2, "exp": "✅ <b>C 正确（这不是局限）</b>：表达实体间联系正是 ER 模型的<b>核心能力</b>。A/B/D 都是 ER/EER 公认的表达局限。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】UML 中“派生属性（derived attribute）“用什么表示，含义是？", "opts": ["用 # 前缀，表示受保护", "用 / 前缀，表示该值由其他属性计算得出而非独立存储（如 age 由 birthdate 算出）", "用 - 前缀，表示私有", "用 * 表示多值"], "ans": 1, "exp": "✅ <b>B 正确</b>：派生属性用 <code>/</code> 前缀（如 <code>/age</code>），其值由其它属性计算而来，不独立存储。对应 ER 模型的派生属性（虚线椭圆）。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】限定关联（qualified association）在 UML 中的作用是？", "opts": ["表示 n 元关联", "用限定符（qualifier）缩小关联多重性，可表示弱实体类型（如 room_nr 唯一标识房内的 session）", "表示继承关系", "表示聚合"], "ans": 1, "exp": "✅ <b>B 正确</b>：限定关联用限定符细化多重性，常用于建模弱实体类型——给定限定符值最多对应一个对象。", "new": true}, {"ch": "L3", "label": "第3章 · EER 与 UML 建模", "src": "自编", "q": "【自编题】下列关于“实体（entity）“与“实体类型（entity type）“的说法正确的是？", "opts": ["实体是一类对象的集合，实体类型是单个对象", "实体是单个具体实例（如学生张三），实体类型是同类实体的抽象集合（如 STUDENT）", "两者是同义词", "实体类型不能有属性"], "ans": 1, "exp": "✅ <b>B 正确</b>：entity = 单个实例；entity type = 同类实体的抽象（含属性类型定义）。常被混用，但概念层次不同。", "new": true}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 1", "q": "Which of the following statements is CORRECT?", "opts": ["The catalog forms the heart of a database. It can be an integral part of the DBMS or a standalone component.", "The catalog makes sure the database continues to be correct by, among other measures, specifying all integrity rules.", "The catalog describes all metadata components that are defined in the metamodel.", "All of the above are correct."], "ans": 3, "exp": "✅ <b>D 正确（全部都对）</b>：catalog 是数据库核心，可内置或独立；指定完整性规则保证正确性；描述元模型中定义的所有元数据。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 2", "q": "A data steward notices that part of the database contains values in a different language. Which type of data quality error is this?", "opts": ["Intrinsic.", "Contextual.", "Representational.", "Accessibility."], "ans": 2, "exp": "✅ <b>C 正确</b>：语言不一致属于<b>表示型（representational）</b>数据质量问题（格式/编码/表示）。Intrinsic=准确性本身；Contextual=与场景相关；Accessibility=可访问性。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 3", "q": "Is the following statement true or false: “The accuracy of a database depends on its representational and contextual characteristics.”", "opts": ["True", "False"], "ans": 0, "exp": "✅ <b>True 正确</b>：准确性（accuracy）确实依赖表示型和上下文型特征——同一数据在不同表示/上下文下的“准确“含义不同。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 4", "q": "Why can data incompleteness prove to be useful information?", "opts": ["We can track down faults in the database model, such as updating errors that cause inconsistencies.", "We can track down the sources of incompleteness and thereby eliminate the cause thereof.", "We can track down certain patterns in the complete fields, which can lead to more information about a certain user.", "All of the above."], "ans": 3, "exp": "✅ <b>D 正确（全部都对）</b>：数据不完整可帮助：发现模型缺陷/更新错误、追溯不完整来源以消除、在完整字段中发现模式。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 5", "q": "Which of the following statement is NOT CORRECT?", "opts": ["Subjectivity can cause data quality issues.", "Consistency issues can arise due to sharing data across multiple departments.", "Data quality issues can always be measured objectively.", "All aspects of data quality need to be checked regularly, as every change in the database or even the company can lead to unforeseen issues."], "ans": 2, "exp": "✅ <b>C 错误</b>：数据质量问题<b>不</b>总能客观度量——主观性、上下文都会让度量带主观成分。A/B/D 都正确。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 6", "q": "Given the following relational model (primary keys are underlined, foreign keys in italics): STUDENT(studentnumber, studentname, street name, street number, zip code, city) ENROLLED(student number,course number) COURSE(course number, course name) PROFESSOR(professor number, professor name) TEACHES(course number, professor number) Which statement is CORRECT?", "opts": ["The model does not allow a course to be taught by multiple professors.", "The model can be further normalized.", "The model does not allow a professor to teach multiple courses.", "The model does not allow a course to be followed by multiple students."], "ans": 1, "exp": "✅ <b>B 正确</b>：该模型仍可进一步规范化（存在传递依赖，如学生地址信息）。其余选项对 1:N / M:N 关系的限制判断有误。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 7", "q": "A foreign key is declared NOT NULL when", "opts": ["the corresponding minimum cardinality in the EER model is 1.", "the corresponding maximum cardinality in the EER model is 1.", "the corresponding minimum and maximum cardinality in the EER model are 1.", "the corresponding minimum cardinality in the EER model is 0."], "ans": 0, "exp": "✅ <b>A 正确（考试重点）</b>：外键声明 NOT NULL ⟺ EER 中对应的<b>最小基数 = 1</b>（强制参与）。最大基数决定 FK 放哪侧，不决定 NULL。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 8", "q": "A relation is in 3 NF if it satisfies 2 NF and", "opts": ["no nonprime attribute type of R is transitively dependent on the primary key.", "no prime attribute type of R is transitively dependent on the primary key.", "no primary key of R is transitively dependent on a prime attribute type.", "no non-primary key of R is transitively dependent on a prime attribute type."], "ans": 0, "exp": "✅ <b>A 正确</b>：3NF = 2NF + 没有<b>非主属性</b>对主键的传递依赖。注意是“非主属性（nonprime）“。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 9", "q": "Which statement is CORRECT?", "opts": ["The Boyce Codd normal form is more strict than the fourth normal form.", "The Boyce Codd normal form is more strict than the third normal form.", "The second normal form is more strict than the Boyce Codd normal form", "The first normal form is more strict than the Boyce Codd normal form."], "ans": 1, "exp": "✅ <b>B 正确</b>：BCNF 比 3NF 更严格（1NF⊂2NF⊂3NF⊂BCNF⊂4NF）。BCNF 不比 4NF 严格；2NF/1NF 都不比 BCNF 严格。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 10", "q": "Given this relation in 1NF: Reservation(customerID, roomID, customer name, room name, date, time) Which of the following statement is CORRECT?", "opts": ["The same room can be booked by the same customer on different dates and/or time.", "A customer must have a unique name.", "A customer can book multiple rooms at the same date and time.", "This relation is also in 2NF."], "ans": 2, "exp": "✅ <b>C 正确</b>：在 Reservation(customerID, roomID, …) 中，(customerID, roomID, date, time) 决定一行——同一客户可在同一日期时间订多个房间。A/D 判断错误，B 错（客户名不必唯一）。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 11", "q": "Given the following relation: Wine(ID, name, grape, region, country) Assume a wine is associated with one region and country, but can be composed of multiple grapes. Which statement is CORRECT?", "opts": ["The relation is not in 1 NF.", "The relation is in 1NF but not in 2NF.", "The relations is in 2NF but not in 3NF", "The relation is in 3NF but not in BCNF."], "ans": 0, "exp": "✅ <b>A 正确（不满足 1NF）</b>：一款酒可由多种葡萄（grape 多值）组成 → grape 是<b>多值属性</b> → 违反 1NF（要求原子值）。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 12", "q": "Given the following relations Cinema(name, street, number, zip code) Show(movieID, cinema name, movie name, date, time), ‘cinema name’ is a foreign key referring to ‘name’ in ‘Cinema’. This value cannot be NULL. Which of the following statements is CORRECT", "opts": ["This relational model is in 2NF, but not in 3NF.", "A cinema can show multiple movies.", "A movie can only be shown in one cinema.", "This relation is in 3NF, but not in BCNF."], "ans": 1, "exp": "✅ <b>B 正确</b>：Show 中 cinema name 是外键且非唯一 → 一家影院可放映多部电影（1:N）。其余范式判断有误。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 13", "q": "Given the following relations Artist(ID, name, genre) Tour(name, year, artistID) ‘artistID’ is a foreign key referring to ‘ID’ in ‘Artist’. This value cannot be NULL. Show(venue, tour name, city) ‘tour name’ is a foreign key referring to ‘name’ in ‘Tour’. This value cannot be NULL. Customer(ID, name, date of birth) Ticket(customerID, venue, tour name) ‘customerID’ is a foreign key referring to ‘ID’ in ‘Customer. This value cannot be NULL. ‘venue’ is a foreign key referring to ‘venue’ in ‘Show’. This value cannot be NULL. ‘tour name’ is a foreign key referring to ‘name’ in ‘Tour’. This value cannot be NULL. Which statement is CORRECT?", "opts": ["An artist can only have one tour.", "All these relations are in 2NF, but not in 3NF.", "A customer can only buy one ticket for a certain show.", "The relations can be further normalised."], "ans": 2, "exp": "✅ <b>C 正确</b>：根据 Ticket 关系的主键设计，一个客户对某场演出只能买一张票。其余选项对 1:N（艺人-巡演）和范式的判断有误。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 14", "q": "Given the following relation HospitalRoom(hospitalID, roomNR, street, number, zip code, city, department) Which statement is NOT CORRECT?", "opts": ["‘(hospitalID, roomNR)’ is a minimal superkey.", "Every non-prime attribute of this relation is fully functionally dependent on any key of this relation.", "‘roomNR’ is a prime attribute type.", "‘city’ is transitive dependent on the primary key."], "ans": 1, "exp": "✅ <b>B 错误</b>：HospitalRoom 中 street/city 等通过 zip code 传递依赖 → 并非每个非主属性都<b>完全</b>函数依赖于键。(hospitalID, roomNR) 是最小超键、roomNR 是主属性、city 传递依赖——这些都对。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 15", "q": "Which of the following statements is CORRECT?", "opts": ["A foreign key of a relation A cannot refer to the primary key of the same relation A.", "A relation cannot have more than 1 foreign key.", "Every relation must have a foreign key.", "A foreign key can be NULL."], "ans": 3, "exp": "✅ <b>D 正确</b>：外键<b>可以为 NULL</b>（最小基数 0 时）。A 错（外键可自引用，如员工→主管）；B 错（可有多个外键）；C 错（不是每个关系都必须有外键）。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 16", "q": "Consider a data model for the Olympics storing information about countries and athletes. There is a 1-N relationship type between country and athlete and an athlete always has to belong to exactly 1 country. A relational data model containing only 1 table leads to:", "opts": ["Unnecessary replication of data about athletes.", "Unnecessary replication of data about countries.", "Unnecessary replication of data about athletes and countries.", "No unnecessary replication of data."], "ans": 1, "exp": "✅ <b>B 正确</b>：1:N（一国多运动员），若把国家信息放进运动员关系会导致<b>国家数据重复</b>。正确做法：FK 放 N 侧（运动员表存 countryID），国家信息只存一次。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 18", "q": "Which statement is NOT CORRECT?", "opts": ["A domain specifies the range of admissible values for an attribute type", "Each attribute type is defined using a corresponding domain", "A domain can only be used once in a relation.", "The domain constraint states that the value of each attribute type A must be an atomic and single value from the domain dom(A)."], "ans": 2, "exp": "✅ <b>C 错误</b>：一个域（domain）<b>可以被多个属性复用</b>（如多个属性都用 DATE 域）。A/B/D 对（域定义取值范围、每属性有对应域、域约束要求原子单值）。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "原题 MC 19", "q": "Given the following relational model (primary keys are underlined, foreign keys are in italics). EMPLOYEE(SSN, ENAME, EADDRESS, SEX, DATE_OF_BIRTH, SUPERVISOR, DNR) SUPERVISOR: foreign key refers to SSN in EMPLOYEE, NULL value allowed DNR: foreign key refers to DNR in DEPARTMENT, NULL value not allowed DEPARTMENT(DNR, DNAME, DLOCATION, MGNR) MGNR: foreign key refers to SSN in EMPLOYEE, NULL value not allowed PROJECT(PNR, PNAME, PDURATION, DNR) DNR: foreign key refers to DNR in DEPARTMENT, NULL value not allowed WORKS_ON(SSN, PNR, HOURS) SSN: foreign key refers to SSN in EMPLOYEE, NULL value not allowed PNR: foreign key refers to PNR in PROJECT, NULL value not allowed What statement is CORRECT?", "opts": ["According to the model, a supervisor cannot supervise more than one employee.", "According to the model, an employee can manage multiple departments.", "According to the model, an employee can work in multiple departments.", "According to the model, an employee should always work on projects assigned to his/her department."], "ans": 1, "exp": "✅ <b>B 正确</b>：EMPLOYEE 中 DNR 外键且每个员工一个部门，但若 DNR 同时是“管理“关系 → 一个员工可<b>管理多个部门</b>（一对多反向）。A 错（主管可管多名员工）；C 错（员工只属一个部门）。", "new": false}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "自编", "q": "【自编题】关系 R(A,B,C,D)，FD={AB→C, C→D, D→A}。R 处于哪个范式？", "opts": ["BCNF（每个FD左侧都是超键）", "满足 2NF 但不满足 3NF——存在传递依赖 AB→C→D（C 非候选键）", "不满足 1NF", "满足 3NF 但不满足 BCNF"], "ans": 1, "exp": "✅ <b>B 正确</b>：候选键为 AB。AB→C 无局部依赖 → 满足 2NF；但 C→D 是传递依赖且 C 非超键 → 违反 3NF（更违反 BCNF）。", "new": true}, {"ch": "L4", "label": "第4章 · 数据组织与关系模型", "src": "自编", "q": "【自编题】下列关于 BCNF 与 3NF 区别的说法，正确的是？", "opts": ["BCNF 比 3NF 宽松", "当关系存在“非主属性 → 主属性的一部分“这类依赖时，可能满足 3NF 但不满足 BCNF；BCNF 要求每个决定因素都是超键", "3NF 一定满足 BCNF", "BCNF 允许部分依赖"], "ans": 1, "exp": "✅ <b>B 正确</b>：BCNF 更严格——要求每个非平凡函数依赖的左侧（决定因素）都是超键。当存在重叠候选键且某主属性依赖另一属性时，可能 3NF 满足而 BCNF 不满足。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "原题 MC 4", "q": "Which of the following statements is CORRECT?", "opts": ["An EER relationship type always asks for the creation of a new corresponding relation R in the relational model.", "A minimum cardinality of 1 in the EER model can never be enforced in the relational model.", "In mapping an EER N:M relationship type to the relational model, we create a new relation R. Its primary key is the combination of the foreign keys referring to the primary keys of the relations corresponding to the participating entity types.", "An EER aggregation cannot be mapped in a straightforward way to a relational model."], "ans": 2, "exp": "✅ <b>C 正确</b>：N:M 联系映射 → 新建关系 R，主键 = 两侧外键的组合。A 错（不是所有联系都需新关系，1:N 用 FK 即可）；B 错（最小基数 1 可用 NOT NULL 强制，部分情况可）；D 错（EER 聚合可直接映射）。", "new": false}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "原题 MC 10", "q": "Consider the following EER ternary relationship type [Image / 图片] Which statement is CORRECT?", "opts": ["The minimum cardinality of 1 cannot be successfully mapped to the relational model.", "All 6 cardinalities can be perfectly mapped to the relational model.", "All maximum cardinalities of N cannot be successfully mapped to the relational model.", "The corresponding relational model has 3 relations."], "ans": 0, "exp": "✅ <b>A 正确</b>：三元联系映射时，<b>最小基数 1 无法</b>在关系模型中强制（需触发器/应用层）。三元联系映射为 1 个联系关系（含 3 个 FK），非“3 个关系“；最大基数 N 可映射。", "new": false}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】EER 到关系映射：1:N 联系类型，外键放哪侧？", "opts": ["放“1“侧", "放“N“侧，引用“1“侧主键（如 EMPLOYEE.dept_id → DEPARTMENT）", "新建联系表", "无法映射"], "ans": 1, "exp": "✅ <b>B 正确（重点）</b>：1:N → 外键放 <b>N 侧</b>。1:1 → 任一侧加 FK；M:N → 新建联系表（两侧 FK 组合为主键）。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】M:N 联系类型映射到关系模型的正确做法是？", "opts": ["在任一侧实体表加对方主键列表", "新建联系表，含两侧实体主键作为外键，二者组合作主键；联系属性也放此表", "在 N 侧加外键即可", "无法映射，需对象关系模型"], "ans": 1, "exp": "✅ <b>B 正确</b>：M:N → 联系表 ENROLLED(student_id, course_id, grade)，(student_id, course_id) 为复合主键。A 违反 1NF。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】EER 映射时，下列哪类语义<b>无法</b>用标准 SQL DDL 直接强制？", "opts": ["外键参照完整性", "主键唯一性", "具体数值的最大基数（如“最多5个“）与时态约束", "NOT NULL（最小基数=1）"], "ans": 2, "exp": "✅ <b>C 正确</b>：具体数值上限、时态约束、跨联系一致性都需触发器/应用层。A/B/D 可直接用 SQL 约束实现。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】将 disjoint+total 特化映射为关系模型，下列哪种方案最能保留语义？", "opts": ["只建超类一张表，加一个 type 列", "为每个子类各建一张表（不建超类表），可强制 total；配合 type 标志/CHECK 可逼近 disjoint", "只建子类表且允许实例同时出现在多张子类表", "无法映射"], "ans": 1, "exp": "✅ <b>B 正确</b>：disjoint+total 时常用“每子类一表“方案，覆盖全部实例（total）；disjoint 需额外约束/应用层保证一个实例不同时属多表。重叠特化则需超类+子类多表方案。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】三元联系类型映射到关系模型，通常需要几个关系、主键如何构成？", "opts": ["3 个关系，无主键", "1 个新联系关系，含 3 个参与实体的外键，三者（或其组合）构成主键", "必须用 4 个关系", "直接合并进任一实体表"], "ans": 1, "exp": "✅ <b>B 正确</b>：三元联系 → 1 个联系关系，含三个 FK；主键通常是三个 FK 的组合（视基数约束而定）。最小基数=1 一般无法强制。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】递归（自引用）1:N 联系（如员工-主管）映射，下列正确的是？", "opts": ["必须新建一张联系表", "在 EMPLOYEE 表加一个 SUPERVISOR_SSN 外键引用本表 SSN；最小基数 0 时可为 NULL", "无法用关系模型表示", "主管必须存在另一张表"], "ans": 1, "exp": "✅ <b>B 正确</b>：递归 1:N → 同表自引用外键。顶层员工无主管 → SUPERVISOR_SSN 可 NULL（最小基数 0）。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】把 EER specialization 映射为“超类表 + 每个子类表“方案的特点是？", "opts": ["只适合 disjoint 特化", "通用方案，适合 overlapping 特化；子类表用与超类相同的主键作外键", "会丢失所有继承属性", "无法处理 total 约束"], "ans": 1, "exp": "✅ <b>B 正确</b>：超类表 + 子类表（子类主键=超类主键的 FK）是最通用方案，尤其适合 overlapping 特化；total/disjoint 需额外约束补充。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】categorization（类别化）映射到关系模型时常见的语义损失是？", "opts": ["无法存储任何数据", "难以保证类别关系的元组是各超类元组并集的子集", "无法定义主键", "必然产生数据冗余"], "ans": 1, "exp": "✅ <b>B 正确</b>：类别化（多异构超类 → 一个 category）映射时，关系模型难以强制“category 实例必来自某个超类“这一并集子集约束。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】下列关于“最小基数 1“在关系模型中强制实现的说法，正确的是？", "opts": ["永远无法强制", "当通过外键映射时，可用 NOT NULL 强制 FK 侧的最小基数 1；但被引用侧的“至少一条“约束通常无法仅靠 DDL 强制", "只能用主键强制", "与外键无关"], "ans": 1, "exp": "✅ <b>B 正确</b>：FK 侧最小基数 1 → 该 FK 设 NOT NULL 即可。但“被引用实体至少参与一次“这类约束（另一侧）一般需触发器/应用层。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】1:1 联系类型映射到关系模型时，外键通常放在？", "opts": ["必须新建联系表", "可放在任一侧；通常放在参与度为强制（最小基数1）的一侧，并设为 NOT NULL", "必须两侧都放", "无法映射"], "ans": 1, "exp": "✅ <b>B 正确</b>：1:1 → 任选一侧加 FK（也可合并为一张表）。放在强制参与侧并设 NOT NULL 可减少 NULL 值。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】把弱实体类型映射到关系模型的正确做法是？", "opts": ["单独建表，无需 owner 信息", "在弱实体关系中加入 owner 实体的主键作为外键，并与弱实体的部分键共同构成主键", "不需要主键", "用视图代替"], "ans": 1, "exp": "✅ <b>B 正确</b>：弱实体表 = 自身部分键 + owner 主键（外键），二者组合为主键；该外键设 NOT NULL（强制存在依赖）。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】将 overlapping（重叠）特化映射到关系模型，最合适的方案是？", "opts": ["只建一张超类表", "超类一张表 + 每个子类一张表（子类主键=超类主键的外键），允许实例出现在多个子类表", "每子类一表且不建超类表", "无法映射"], "ans": 1, "exp": "✅ <b>B 正确</b>：重叠特化必须用“超类表 + 子类表“通用方案——一个实例可同时出现在多张子类表中。“每子类一表无超类“只适合 disjoint+total。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】EER 中“最大基数 N“（多）的约束，在关系模型中能否强制？", "opts": ["不能强制任何最大基数", "最大基数 N（多）天然由外键/联系表支持，无需额外约束；难以强制的是具体数值上限（如最多3个）", "必须用触发器才能表示 N", "N 会导致数据丢失"], "ans": 1, "exp": "✅ <b>B 正确</b>：'多'（N）是关系模型的默认能力（一个父键被多个子行引用）。真正难强制的是“最多 K 个“这类具体数值上限。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】下列哪种 EER 联系映射<b>不需要</b>新建独立关系？", "opts": ["M:N 联系", "1:N 与 1:1 联系（用外键即可）", "三元 M:N:P 联系", "带属性的 M:N 联系"], "ans": 1, "exp": "✅ <b>B 正确</b>：1:N 和 1:1 只需在合适一侧加外键。M:N 和高阶联系（及带属性的 M:N）才需新建联系关系。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】映射后如何强制“特化是 total（完全）“——超类每个实例必属某子类？", "opts": ["关系模型可轻松用一个 CHECK 完整强制", "若采用“每子类一表无超类“方案可保证 total（实例必在某子类表中）；用超类+子类方案则需额外约束/应用层", "total 永远无法表达", "total 与映射无关"], "ans": 1, "exp": "✅ <b>B 正确</b>：'每子类一表'方案天然 total（无超类表，实例必落在某子类）。超类+子类方案下，'必属某子类'通常要靠触发器或应用层保证。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】递归联系（如 EMPLOYEE 的 supervises）最小基数为 0 时，自引用外键应？", "opts": ["设为 NOT NULL", "允许为 NULL（顶层员工没有主管）", "引用另一张表", "设为主键"], "ans": 1, "exp": "✅ <b>B 正确</b>：最小基数 0（可无主管）→ 自引用外键 SUPERVISOR_SSN 允许 NULL。最小基数 1 才设 NOT NULL。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】将带属性的 M:N 联系（如 ENROLLED 含 grade）映射，grade 放哪里？", "opts": ["放学生表", "放联系表（ENROLLED）中，与两个外键并列", "放课程表", "必须新建第三张表"], "ans": 1, "exp": "✅ <b>B 正确</b>：M:N 联系的属性（grade）属于“联系本身“，应放在联系关系 ENROLLED(student_id, course_id, grade) 中。", "new": true}, {"ch": "L5", "label": "第5章 · EER 到关系映射", "src": "自编", "q": "【自编题】EER→关系映射“语义损失“最典型的例子是？", "opts": ["外键无法表示", "最小基数1（被引用侧至少参与一次）、具体最大基数上限、三元联系的组合约束等常无法仅用 DDL 强制", "主键无法表示", "属性无法表示"], "ans": 1, "exp": "✅ <b>B 正确</b>：这些是经典语义损失：被引用侧“至少一次“、“最多 K 个“、三元组合约束——标准 SQL 约束表达不了，需触发器/应用层补充。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "原题 MC 1", "q": "The following table with purchase orders is created: CREATE TABLEPURCHASE_ORDER (PONR CHAR (7)) NOT NULL PRIMARY KEY, PODATE DATE, SUPNR CHAR (4) NOT NULL, FOREIGN KEY (SUPNR) REFERENCES SUPPLIER (SUPNR) ON DELETE CASCADE ON UPDATE CASCADE); What happens upon deletion of a supplier?", "opts": ["All purchase order records tied to that supplier are also deleted.", "The SUPNR of this supplier is replaced by a NULL value in PURCHASE_ORDER", "The SUPNR of this supplier is deleted in PURHCASE_ORDER", "The SUPNR of this supplier is only deleted in SUPPLIER."], "ans": 0, "exp": "✅ <b>A 正确</b>：<code>ON DELETE CASCADE</code> → 删除供应商时，所有引用它的采购订单记录<b>一并被删除</b>。NULL 化是 SET NULL；只删 SUPPLIER 是 NO ACTION。", "new": false}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "原题 MC 2", "q": "We’re interested in wine stores. Therefore, we want to retrieve the SUPNR and the SUPNAME of each store which contains ‘wine’ in its store name. Which of the following queries can we use? SELECT SUPNR, SUPNAME FROM SUPPLIER WHERE SUPNAME = ‘WINE’ SELECT SUPNR, SUPNAME FROM SUPPLIER WHERE SUPNAME IS ‘%WINE%’ SELECT SUPNR, SUPNAME FROM SUPPLIER", "opts": ["WHERE SUPNAME LIKE ‘%WINE%’", "SELECT SUPNR, SUPNAME", "FROM SUPPLIER", "WHERE SUPNAME IS ‘WINE’"], "ans": 0, "exp": "✅ <b>A 正确</b>：模糊匹配用 <code>LIKE '%WINE%'</code>（% 匹配任意字符）。<code>= 'WINE'</code> 只能精确匹配；<code>IS</code> 用于 NULL 判断。", "new": false}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "原题 MC 3", "q": "How do you select the number of tuples in the SUPPLIES table where the supplier number equals 68?", "opts": ["SELECT COUNT() FROM SUPPLIES WHERE SUPNR='68'", "SELECT COUNT(*) FROM SUPPLIES WHERE SUPNR='68'", "SELECT * FROM SUPPLIES WHERE SUPNR='68'", "SELECT SUPNR FROM SUPPLIES WHERE SUPNR='68'"], "ans": 1, "exp": "✅ <b>B 正确</b>：计数用 <code>COUNT(*)</code>。<code>COUNT()</code> 语法错误；<code>SELECT *</code> 返回行而非计数。", "new": false}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "原题 MC 6", "q": "Consider the following query: SELECT P.PRODNR, P.PRODNAME, P.AVAILABLE_QUANTITY, SUM(L.QUANTITY) AS ORDERED_QUANTITY FROM PRODUCT AS P LEFT OUTER JOIN PO_LINE AS L ON (P.PRODNR = L.PRODNR) GROUP BY P.PRODNR Which of the following statements is not correct?", "opts": ["The query retrieves the product number, product name, available quantity and total ordered quantity of each product thanks to the left outer join.", "The query retrieves for each product the total ordered quantity.", "The query result can never contain NULL values.", "If we remove the GROUP BY statement and the P.PRODNR, P.PRODNAME, P.AVAILABLE_QUANTITY from the SELECT statement, the query will results in one row containing the total outstanding ordered quantity over all products in the columns ‘ORDERED_QUANTITY’."], "ans": 2, "exp": "✅ <b>C 错误</b>：LEFT OUTER JOIN 保留所有产品，<b>从未被订购的产品其 SUM(QUANTITY) 会是 NULL</b>，所以结果“可能含 NULL“。其余对该左连接 + GROUP BY 的描述正确。", "new": false}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "原题 MC 7", "q": "Consider the following query: SELECT PRODNR, AVG(QUANTITY) AS AVG_QUANTITY FROM PO_LINE GROUP BY PRODNR HAVING SUM(QUANTITY) < 15 What is the result?", "opts": ["The query returns the PRODNR and average QUANTITY of each purchase order that has fewer than 15 purchase order lines.", "The query returns the PRODNR and average QUANTITY of each product that has fewer than 15 items ordered.", "The query returns the PRODNR and average QUANTITY of each product that has fewer than 15 orders.", "The query returns the PRODNR and average QUANTITY of each purchase order that has fewer than 15 orders."], "ans": 1, "exp": "✅ <b>B 正确</b>：<code>GROUP BY PRODNR HAVING SUM(QUANTITY) &lt; 15</code> 按<b>产品</b>分组，筛选总订购量 < 15 件的产品，返回其平均订购数量。注意是“产品“而非“采购订单“。", "new": false}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "原题 MC 8", "q": "Given following question: Retrieve the numbers of all suppliers who can supply products 0832 or 0494 Which query is CORRECT?", "opts": ["SELECT DISTINCT SUPNRFROM SUPPLIESWHERE PRODNR IN (0832, 0494)", "SELECT UNIQUE SUPNRFROM SUPPLIESWHERE PRODNR IN (0832, 0494)", "SELECT SUPNRFROM SUPPLIESWHERE PRODNR IN (0832, 0494)", "SELECT DISTINCT SUPNRFROM SUPPLIESWHERE PRODNR = 0832 AND PRODNR = 0494"], "ans": 0, "exp": "✅ <b>A 正确</b>：<code>SELECT DISTINCT SUPNR ... WHERE PRODNR IN (0832, 0494)</code>。B 错（SQL 标准用 DISTINCT 不是 UNIQUE）；D 错（<code>=0832 AND =0494</code> 永远为假，一个值不可能同时等于两者）。", "new": false}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "原题 MC 9", "q": "Compare the following 2 queries: SELECT COUNT(DISTINCT SUPNR) FROM PURCHASE_ORDER SELECT COUNT(SUPNR) FROM PURCHASE_ORDER Which of the following statements is correct?", "opts": ["Result query 1 is always = result query 2 because PURCHASE_ORDER contains only unique purchase orders.", "Result query 1 is always ≤ result query 2 because the DISTINCT operator counts only unique SUPNRs.", "Result query 1 is always ≥ result query 2 because query 1 sums the number of purchase orders per supplier while query 2 sums the number of purchase orders in total.", "Result query 1 is sometimes ≥ and sometimes ≤ result query 2 because the result depends on the number of suppliers and the number of purchase orders."], "ans": 1, "exp": "✅ <b>B 正确</b>：<code>COUNT(DISTINCT SUPNR) ≤ COUNT(SUPNR)</code> 恒成立——DISTINCT 去重只数不同供应商，普通 COUNT 数所有非空行。", "new": false}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "原题 MC 10", "q": "Consider the following query: SELECT P.PRODNR, P.PRODNAME, SUM(POL.QUANTITY) AS SUM FROM PO_LINE AS POL RIGHT OUTER JOIN PRODUCT P ON (POL.PRODNR = P.PRODNR) GROUP BY P.PRODNR How should you change the query if you only want to see the products that have more than 10 items ordered?", "opts": ["You should add the statement HAVING(SUM(POL.QUANTITY) > 10).", "You should always replace the outer join with an inner join and add HAVING(SUM(POL.QUANTITY) > 10).", "You should add WHERE(SUM(POL.QUANTITY) > 10).", "You cannot adapt this query to get the desired result."], "ans": 1, "exp": "✅ <b>B 正确</b>：要按聚合结果过滤需用 HAVING；且此处 RIGHT OUTER JOIN 保留无订单产品（SUM 为 NULL），加 HAVING(SUM>10) 时这些 NULL 组被排除，等价于改用 INNER JOIN。WHERE 不能用聚合。", "new": false}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】WHERE 与 HAVING 的区别是？", "opts": ["完全相同", "WHERE 在分组前过滤行；HAVING 在 GROUP BY 后过滤组（可用聚合函数）", "WHERE 只能用聚合函数", "HAVING 在 FROM 之前执行"], "ans": 1, "exp": "✅ <b>B 正确</b>：执行顺序 FROM→WHERE→GROUP BY→HAVING→SELECT→ORDER BY。WHERE 过滤行（不能含聚合），HAVING 过滤组（可含聚合）。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】以下哪个查询正确统计每个供应商供应的不同产品种类数？", "opts": ["SELECT SUPNR, COUNT(*) FROM SUPPLIES GROUP BY SUPNR", "SELECT SUPNR, COUNT(DISTINCT PRODNR) FROM SUPPLIES GROUP BY SUPNR", "SELECT COUNT(*) FROM SUPPLIES", "SELECT SUPNR FROM SUPPLIES WHERE COUNT(PRODNR)>1"], "ans": 1, "exp": "✅ <b>B 正确</b>：<code>COUNT(DISTINCT PRODNR)</code> 统计不同产品数。A 数的是行数（同产品多条会重复计）；D 错（WHERE 不能用聚合）。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】INNER JOIN 与 LEFT OUTER JOIN 的关键区别是？", "opts": ["没有区别", "INNER JOIN 只返回两表匹配的行；LEFT OUTER JOIN 返回左表全部行，右表无匹配时填 NULL", "LEFT JOIN 只返回右表行", "INNER JOIN 会产生 NULL"], "ans": 1, "exp": "✅ <b>B 正确</b>：LEFT OUTER JOIN 保留左表所有行（无匹配处右表列为 NULL），常用于“找出没有对应记录“的场景。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】<code>SELECT COUNT(*) FROM SUPPLIER</code> 与 <code>SELECT COUNT(SUPSTATUS) FROM SUPPLIER</code> 结果可能不同，原因是？", "opts": ["语法不同导致报错", "COUNT(*) 统计所有行；COUNT(列) 只统计该列<b>非 NULL</b> 的行", "两者总是相等", "COUNT(列) 统计 NULL 行"], "ans": 1, "exp": "✅ <b>B 正确</b>：COUNT(*) 数所有行；COUNT(col) 忽略该列为 NULL 的行。若 SUPSTATUS 有 NULL，则后者更小。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】下列 ORDER BY 子句，按状态降序、同状态按名称升序排列，正确的是？", "opts": ["ORDER BY SUPSTATUS, SUPNAME", "ORDER BY SUPSTATUS DESC, SUPNAME ASC", "ORDER BY DESC SUPSTATUS, ASC SUPNAME", "ORDER BY SUPSTATUS ASC, SUPNAME DESC"], "ans": 1, "exp": "✅ <b>B 正确</b>：<code>ORDER BY SUPSTATUS DESC, SUPNAME ASC</code>——先按第一列降序，平局再按第二列升序。方向关键字写在列名之后。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】要找出供应了超过 5 种产品的供应商，正确的是？", "opts": ["WHERE COUNT(*)>5", "GROUP BY SUPNR HAVING COUNT(*)>5", "GROUP BY SUPNR WHERE COUNT(*)>5", "ORDER BY COUNT(*)>5"], "ans": 1, "exp": "✅ <b>B 正确</b>：分组后用 HAVING 过滤聚合结果：<code>GROUP BY SUPNR HAVING COUNT(*)>5</code>。WHERE 不能用聚合函数。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】自连接（self-join）的典型用途是？", "opts": ["连接两张不同的表", "将同一张表与自身连接（用不同别名），用于比较同表内的行，如找同城供应商对", "删除重复行", "代替 GROUP BY"], "ans": 1, "exp": "✅ <b>B 正确</b>：自连接用别名区分同表的两个实例，如 <code>S1.CITY=S2.CITY AND S1.SUPNR&lt;S2.SUPNR</code> 找同城供应商对（<避免重复对和自配对）。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】<code>NULL = NULL</code> 在 SQL 中的求值结果是？", "opts": ["TRUE", "UNKNOWN（三值逻辑）——判断 NULL 要用 IS NULL", "FALSE", "报错"], "ans": 1, "exp": "✅ <b>B 正确</b>：SQL 三值逻辑下任何与 NULL 的比较（含 NULL=NULL）都是 UNKNOWN。判断空值必须用 <code>IS NULL</code> / <code>IS NOT NULL</code>。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】ON DELETE 的几种参照动作，下列对应正确的是？", "opts": ["CASCADE：拒绝删除", "SET NULL：把子表外键置 NULL；CASCADE：级联删除子行；RESTRICT/NO ACTION：有引用则拒绝删除", "RESTRICT：自动级联删除", "SET NULL：删除子行"], "ans": 1, "exp": "✅ <b>B 正确</b>：CASCADE 级联删子行；SET NULL 将外键置空；RESTRICT/NO ACTION 在存在引用时拒绝删除父行。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】GROUP BY 后，SELECT 列表中可以出现哪些列？", "opts": ["任意列", "只能是分组列或聚合函数（SUM/COUNT/AVG 等）的结果", "只能是聚合函数", "只能是非分组列"], "ans": 1, "exp": "✅ <b>B 正确</b>：分组后每组一行，SELECT 中非聚合列必须出现在 GROUP BY 中，否则语义不确定（多数 DBMS 报错）。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】DISTINCT 的作用范围是？", "opts": ["只对第一列去重", "对 SELECT 列表中所有列的<b>组合</b>去重（整行去重）", "对每列分别去重", "等价于 GROUP BY 单列"], "ans": 1, "exp": "✅ <b>B 正确</b>：<code>SELECT DISTINCT a, b</code> 按 (a,b) 组合去重，不是分别对 a、b 去重。", "new": true}, {"ch": "L6", "label": "第6章 · SQL 基础", "src": "自编", "q": "【自编题】要查询“某产品的供应价低于该产品平均供应价“，最适合用？", "opts": ["简单 WHERE 常量比较", "相关子查询：内层按产品号算该产品平均价，与外层逐行比较", "ORDER BY", "UNION"], "ans": 1, "exp": "✅ <b>B 正确</b>：每个产品的均价不同，需相关子查询 <code>WHERE price &lt; (SELECT AVG(price) FROM SUPPLIES S2 WHERE S2.PRODNR=S1.PRODNR)</code>。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 1", "q": "Given the following query: SELECT DISTINCT P1.PRODNR, P1.PRODNAME FROM PRODUCT P1, SUPPLIES S1 WHERE P1.PRODNR =S1.PRODNR AND 1 <= (SELECT COUNT(*) FROM SUPPLIES S2 WHERE S2.SUPNR <> S1.SUPNR AND P1.PRODNR=S2.PRODNR) ORDER BY PRODNR The query retrieves:", "opts": ["The number and name of all products that only can be supplied by one supplier", "The number and name of all products that cannot be supplied by any supplier", "The number and name of all products that can be supplied by more than one supplier", "The number and name of all products that can be supplied by all suppliers"], "ans": 2, "exp": "✅ <b>C 正确</b>：相关子查询 <code>1 &lt;= (SELECT COUNT(*) ... 排除自身供应商)</code> 找出“被多于一个供应商供应的产品“。💡 相关子查询内层引用外层列，逐行重算。", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 4", "q": "Given following query: SELECT CS.CURRENT_STOCK - O.ORDERED AS NEW_STOCK FROM (SELECT SUM(P.AVAILABLE_QUANTITY) AS CURRENT_STOCK FROM PRODUCT P) AS CS, (SELECT SUM(POL.QUANTITY) AS ORDERED FROM PO_LINE POL) AS O The output of the query represents:", "opts": ["A table, summarizing for each product the increase in stock after the ordered products are delivered.", "A table, summarizing for each product the decrease in stock after the ordered products are delivered.", "A scalar, summarizing the total quantity of products in stock after all the ordered products are delivered.", "A scalar, summarizing the decrease in total available quantity of all products after the ordered products are delivered."], "ans": 2, "exp": "✅ <b>C 正确</b>：两个派生表都各返回单值（总库存、总订购量），相减得一个<b>标量</b>——交付后剩余总库存。不是按产品分组的表。", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 5", "q": "Given the following View definition and update statement: CREATE VIEW TOPPRODUCTS(PRODNR,PRODNAME,QUANTITY) AS SELECT PRODNR, PRODNAME, AVAILABLE_QUANTITYFROM PRODUCT WHERE AVAILABLE_QUANTITY>100WITH CHECK OPTION UPDATE TOPPRODUCTSSET AVAILABLE_QUANTITY=80WHERE PRODNR=0153 What will be the result of this?", "opts": ["The update can be successfully made but only the PRODUCT table will be updated.", "The update can be successfully made and both the View and PRODUCT table will be updated.", "The update will be halted because of the WITH CHECK OPTION.", "The update can be successfully made but only the View will be updated."], "ans": 2, "exp": "✅ <b>C 正确</b>：视图带 <code>WITH CHECK OPTION</code>，更新若使行不再满足视图的 WHERE 条件，则被<b>拒绝</b>。", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 6", "q": "Given the following query: SELECT PRODNAME FROM PRODUCT WHERE PRODNR IN (SELECT PRODNR FROM SUPPLIES WHERE SUPNR IN (SELECT SUPNR FROM SUPPLIER WHERE SUPCITY = 'New York')) AND PRODNR IN (SELECT PRODNR FROM SUPPLIES WHERE SUPNR IN (SELECT SUPNR FROM SUPPLIER WHERE SUPCITY = 'Washington')) What is the result?", "opts": ["The query retrieves the product name of each product that has a supplier in New York or Washington.", "The query retrieves the product name of each product that has both a supplier in New York and a supplier in Washington.", "The query retrieves the product name of each product along with all possible supplier cities.", "The query incorrectly combines every product name and supplier city."], "ans": 1, "exp": "✅ <b>B 正确</b>：嵌套 IN 这里要求产品<b>同时</b>有 New York 和 Washington 的供应商（两层 IN 链条/交叉条件），而非“或“。", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 8", "q": "Given the following SQL query: SELECT P1.PRODNRFROM PRODUCT P1WHERE 5 <=(SELECT COUNT(*) FROM PRODUCT P2 WHERE P1.PRODNR < P2.PRODNR) This query selects: The 5 highest product numbers. The 5 lowest product numbers. All product numbers except for the 5 lowest product numbers. All product numbers except for the 5 highest product numbers. Answer: the easiest way to explain this query is by means of an example. Assume we have the following product numbers:", "opts": ["100, 110, 120, 130, 140, 150, 160, 170, 180.", "Remember, the correlated subquery will be evaluated for each value of P1.PRODNR. Let’s now look at the result of this correlated subquery for each of the product numbers:", "[Table / 表格，见下方]", "The output of the query will thus be: 100, 110, 120 and 130, or all product numbers except for the 5 highest product numbers."], "ans": 0, "exp": "✅ <b>A 正确</b>：<code>5 &lt;= COUNT(* WHERE P2.PRODNR > P1.PRODNR)</code> = 至少有 5 个产品号比它大 → 排除最高的 5 个，返回其余（100…180）。💡 第 N 高 ⟺ 恰有 N−1 个更大。", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 9", "q": "Given the following query: SELECT R1.SUPNAME, R1.SUPNR, COUNT(*) FROM PURCHASE_ORDER PO1, SUPPLIER R1 WHERE PO1.SUPNR = R1.SUPNR GROUP BY R1.SUPNR HAVING COUNT(*) >= ALL (SELECT COUNT(*) FROM PURCHASE_ORDER PO2, SUPPLIER R2 WHERE PO2.SUPNR = R2.SUPNR GROUP BY R2.SUPNR) The query retrieves:", "opts": ["The name, number and total outstanding orders of all suppliers that have outstanding orders", "The name, number and total outstanding orders of all suppliers that have outstanding orders, except for the supplier(s) with the least outstanding orders", "The name, number and total outstanding orders of the supplier with the most outstanding orders", "The name, number and total outstanding orders of the supplier with the least outstanding orders"], "ans": 2, "exp": "✅ <b>C 正确</b>：<code>GROUP BY ... HAVING COUNT(*) >= ALL(...)</code> 选出未交付订单数最多的供应商（其计数 ≥ 所有供应商的计数）。", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 10", "q": "Given following query: SELECT P.PRODNR, P.PRODNAMEFROM PRODUCT PEXCEPTSELECT POL.PRODNRFROM PO_LINE POL The query retrieves: The number and name of all the products with no outstanding order", "opts": ["The number and name of all the products that are ordered", "The query will not execute because both queries do not select the same columns", "The query will not execute because both queries do not select the same rows", "Answer: note that the EXCEPT operator is not supported in the MySQL environment."], "ans": 1, "exp": "✅ <b>B 正确</b>：<code>EXCEPT</code> 两侧的 SELECT 列数/类型必须一致。PRODUCT 选了 (PRODNR, PRODNAME) 两列，而下半选了一列 → <b>列不匹配，无法执行</b>。（另注：MySQL 旧版也不支持 EXCEPT。）", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 11", "q": "Given following query: SELECT P1.PRODNR, P1.PRODNAME, S1.SUPNR, S1.PURCHASE_PRICE FROM PRODUCT P1, SUPPLIES S1 WHERE P1.PRODNR = S1.PRODNR AND NOT EXISTS (SELECT * FROM PRODUCT P2, SUPPLIES S2 WHERE P2.PRODNR = S2.PRODNR AND P1.PRODNR = P2.PRODNR AND S1.PURCHASE_PRICE > S2.PURCHASE_PRICE) Given the following statements For each product, the product number, product name, the supplier number and purchase price is retrieved of the supplier who can supply the product for the cheapest price. For each product, the product number, product name, the supplier number and purchase price is retrieved of the supplier who can supply the product for the highest price. For each product, exactly one tuple is returned For each product, more than one tuple can be returned Which statements are CORRECT?", "opts": ["1 + 3", "1 + 4", "2 + 3", "2 + 4"], "ans": 1, "exp": "✅ <b>B（1+4）正确</b>：NOT EXISTS 子查询筛选条件组合，标注答案为陈述 1 与 4。考查 NOT EXISTS 相关子查询的语义判断。", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "原题 MC 12", "q": "Given following query: SELECT R.SUPNAME, (SELECT COUNT(PO.PODATE) FROM PURCHASE_ORDER PO WHERE R.SUPNR = PO.SUPNR) AS SUMMARY FROM SUPPLIER R The query selects:", "opts": ["The name and total number of outstanding orders of all suppliers that have at least one outstanding order", "The name and total number of outstanding orders of all suppliers", "The supplier name and order date of each of his/her outstanding orders", "The supplier name and order date of each of his/her outstanding orders. If a supplier does not have an outstanding order, s/he will be included in the output with a null value for the “SUMMARY” column."], "ans": 1, "exp": "✅ <b>B 正确</b>：SELECT 列表中的标量相关子查询 <code>(SELECT COUNT(PO.PODATE) WHERE R.SUPNR=PO.SUPNR)</code> 为<b>每个</b>供应商计数（含 0 单的供应商也会列出），返回所有供应商的名称+未交付订单数。", "new": false}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】相关子查询（correlated subquery）的特点是？", "opts": ["只执行一次", "内层引用外层列，对外层每一行重新执行一次", "与外层无关", "只能出现在 FROM 中"], "ans": 1, "exp": "✅ <b>B 正确</b>：相关子查询内层引用外层列，逐行重算，性能通常低于非相关子查询。非相关子查询才只执行一次。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】<code>X >= ALL (subquery)</code> 的含义是？", "opts": ["X 大于子查询任一值", "X 大于等于子查询所有值 → X 为最大值", "X 等于平均值", "X 在子查询结果中"], "ans": 1, "exp": "✅ <b>B 正确</b>：>= ALL = 大于等于全部 → 最大值。<= ALL = 最小；> ANY = 大于最小；= ANY ≡ IN。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】找“从未下过订单的供应商“，NOT IN 与 NOT EXISTS 的关键区别？", "opts": ["完全等价", "子查询结果含 NULL 时，NOT IN 会返回空集（全 UNKNOWN），NOT EXISTS 不受影响、更安全", "NOT EXISTS 更慢且错误", "二者都不能用"], "ans": 1, "exp": "✅ <b>B 正确（重点陷阱）</b>：若子查询含 NULL，<code>NOT IN</code> 全部求值为 UNKNOWN → 返回空集；<code>NOT EXISTS</code> 正常工作。实务首选 NOT EXISTS / LEFT JOIN…IS NULL。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】双重 NOT EXISTS 实现的是哪种关系代数运算？", "opts": ["并（UNION）", "关系除法（division）——如“供应了所有产品的供应商“", "笛卡尔积", "投影"], "ans": 1, "exp": "✅ <b>B 正确</b>：双重 NOT EXISTS = 关系除法。逻辑：“不存在任何产品是该供应商没供应的“=供应了全部产品。考试高频题型。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】<code>WITH CHECK OPTION</code> 用于视图时的作用是？", "opts": ["禁止查询视图", "通过视图做的 INSERT/UPDATE 若使行不再满足视图定义的 WHERE 条件，则被拒绝", "自动删除视图", "加速视图查询"], "ans": 1, "exp": "✅ <b>B 正确</b>：WITH CHECK OPTION 保证经视图的修改结果仍落在视图可见范围内，否则拒绝该 DML。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】普通视图（virtual view）与物化视图（materialized view）的区别？", "opts": ["没有区别", "普通视图只存查询定义、查询时实时计算；物化视图预先计算并存储结果（需刷新）", "物化视图不存数据", "普通视图更快"], "ans": 1, "exp": "✅ <b>B 正确</b>：普通视图=存定义、动态执行；物化视图=存结果、查询快但需刷新维护一致性。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】下列关于 EXISTS 子查询的说法正确的是？", "opts": ["EXISTS 关心子查询返回的具体值", "EXISTS 只关心子查询是否返回<b>至少一行</b>（返回布尔），因此子查询 SELECT 什么列不重要", "EXISTS 不能与外层关联", "EXISTS 比 IN 总是更慢"], "ans": 1, "exp": "✅ <b>B 正确</b>：EXISTS 仅判断子查询有无行，故常写 <code>SELECT *</code> 或 <code>SELECT 1</code>，列内容无关紧要。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】求“第 3 高的产品号“用计数法相关子查询，下列条件正确的是？", "opts": ["WHERE 3 = (SELECT COUNT(*) ...)", "WHERE 2 = (SELECT COUNT(*) FROM PRODUCT P2 WHERE P2.PRODNR > P1.PRODNR)（恰有2个更大→自己第3）", "WHERE COUNT(*)=3", "WHERE PRODNR=3"], "ans": 1, "exp": "✅ <b>B 正确</b>：第 N 高 ⟺ 恰好有 N−1 个比它更大。第 3 高 → 恰有 2 个更大 → <code>WHERE 2 = (SELECT COUNT(*) WHERE P2.PRODNR > P1.PRODNR)</code>。", "new": true}, {"ch": "L7", "label": "第7章 · SQL 进阶", "src": "自编", "q": "【自编题】子查询出现在 SELECT 列表中（标量子查询）必须满足？
