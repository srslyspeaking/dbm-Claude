<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>数据库管理 · 精编复习题库</title>
<style>
:root {
  --ink: #1a2535;
  --muted: #5a6a7e;
  --line: #dce3ed;
  --paper: #f4f7fb;
  --panel: #ffffff;
  --primary: #1a4fa0;
  --primary-d: #123880;
  --accent: #c75c1a;
  --good: #0f6b3e;
  --bad: #b01f1f;
  --good-bg: #eef9f3;
  --bad-bg: #fdf1f1;
  --exp-bg: #f0f5ff;
  --exp-border: #b8cce8;
  --shadow: 0 2px 12px rgba(20,40,80,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  color:var(--ink);background:var(--paper);
}
/* ── HEADER ── */
header{background:#0e1f38;color:#fff;border-bottom:4px solid var(--accent)}
.hdr-inner{max-width:1160px;margin:0 auto;padding:24px 20px 20px;display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap}
h1{font-size:clamp(22px,3.5vw,38px);line-height:1.1;letter-spacing:-.5px;flex:1}
h1 span{color:#7eb3f5;font-size:.55em;font-weight:500;display:block;margin-bottom:4px;letter-spacing:.5px}
.exam-tip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:10px 14px;font-size:13px;color:#c8d8ec;line-height:1.5;max-width:340px}
.exam-tip b{color:#f9c06a}
/* ── LAYOUT ── */
main{max-width:1160px;margin:0 auto;padding:18px 20px 40px;display:grid;grid-template-columns:258px 1fr;gap:16px;align-items:start}
/* ── SIDEBAR ── */
.sidebar{position:sticky;top:12px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
.card-head{padding:12px 14px 10px;font-weight:700;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--line)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid #f0f3f8}
.stat-row:last-child{border-bottom:0}
.stat-row span:first-child{color:var(--muted);font-size:14px}
.stat-row strong{font-size:18px;color:var(--primary)}
.chap-list{padding:8px 10px}
.chap-btn{display:block;width:100%;text-align:left;padding:7px 10px;border:1px solid transparent;border-radius:7px;background:none;cursor:pointer;font:14px/1.4 inherit;color:var(--ink);transition:background .15s}
.chap-btn:hover{background:#eef3fb}
.chap-btn.active{background:#e4eef9;border-color:#b8cfe8;color:var(--primary-d);font-weight:700}
.chap-btn small{display:block;color:var(--muted);font-size:12px;font-weight:400}
/* ── CONTENT ── */
.content{display:flex;flex-direction:column;gap:14px}
.toolbar{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{min-height:34px;padding:6px 14px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);font:600 14px/1 inherit;cursor:pointer;transition:background .15s}
.btn:hover{background:#f0f5fc}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-d)}
.btn.active{background:#e4eef9;border-color:#b8cfe8;color:var(--primary-d)}
.sep{color:var(--line);user-select:none}
/* ── QUESTION ── */
.qblock{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;box-shadow:var(--shadow)}
.qmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:var(--muted)}
.tag{display:inline-block;padding:2px 9px;border-radius:99px;background:#eef2f8;color:#445569;font-weight:600}
.tag.new{background:#fff4e5;color:#924d10}
.qtxt{font-size:16px;font-weight:700;margin-bottom:14px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:8px}
label.opt{display:grid;grid-template-columns:28px 1fr;gap:8px;align-items:start;padding:9px 11px;border:1.5px solid #e0e7f0;border-radius:8px;cursor:pointer;background:#fbfcfe;font-size:14.5px;line-height:1.5;transition:border-color .15s}
label.opt:hover{border-color:#9ab5d8}
label.opt.correct{border-color:#3da06e;background:var(--good-bg)}
label.opt.wrong{border-color:#d9534f;background:var(--bad-bg)}
input[type=radio]{margin-top:3px;accent-color:var(--primary)}
/* ── EXPLANATION ── */
.exp{margin-top:12px;padding:12px 14px;border-radius:8px;background:var(--exp-bg);border-left:4px solid var(--primary);display:none;font-size:14px;line-height:1.7}
.exp.show{display:block}
.exp-head{font-weight:700;color:var(--primary);margin-bottom:6px;font-size:13px;text-transform:uppercase;letter-spacing:.4px}
.exp-why{margin-bottom:6px}
.exp-trap{color:var(--muted);font-size:13.5px}
/* ── RESULT ── */
.result-box{display:none;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;text-align:center}
.result-box.show{display:block}
.result-score{font-size:40px;font-weight:900;color:var(--primary-d);line-height:1}
.result-label{color:var(--muted);margin-top:6px}
/* ── PROGRESS ── */
.prog-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.prog-label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px}
.prog-track{height:8px;border-radius:99px;background:#dde5ef;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);width:0;transition:width .3s}
/* ── MODAL / CODE ── */
code{font-family:"Courier New",monospace;background:#e8edf5;padding:1px 5px;border-radius:4px;font-size:.9em}
pre.sql{background:#0e1f38;color:#b8cfe8;padding:12px;border-radius:8px;overflow-x:auto;font-size:13px;line-height:1.6;margin:8px 0}
pre.sql .kw{color:#79b8ff}
pre.sql .str{color:#9ecbff}
/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;margin:8px 0}
table.data{border-collapse:collapse;font-size:13px}
table.data th,table.data td{border:1px solid #ccd4e0;padding:6px 10px;text-align:left}
table.data th{background:#e8edf5;font-weight:700}
/* ── RESPONSIVE ── */
@media(max-width:860px){
  main{grid-template-columns:1fr}
  .sidebar{position:static}
}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <h1><span>KU Leuven · Database Management</span>精编题库 · 附解析</h1>
    <div class="exam-tip">
      <b>考试要点</b>：30道单选题，4选1；错题扣 <b>-1/3</b> 分；共3小时。
      理论/练习约 <b>60/40</b>。SQL题附 purchase order DDL。
      重点：相关子查询、NOT EXISTS、FK NULL/NOT NULL、三元联系语义、范式。
    </div>
  </div>
</header>

<main>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="card">
      <div class="card-head">答题统计</div>
      <div id="statRows">
        <div class="stat-row"><span>题目总数</span><strong id="statTotal">0</strong></div>
        <div class="stat-row"><span>已作答</span><strong id="statDone">0</strong></div>
        <div class="stat-row"><span>答对</span><strong id="statRight" style="color:var(--good)">0</strong></div>
        <div class="stat-row"><span>答错</span><strong id="statWrong" style="color:var(--bad)">0</strong></div>
        <div class="stat-row"><span>正确率</span><strong id="statPct">—</strong></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head">按章节</div>
      <div class="chap-list" id="chapList"></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="toolbar">
      <button class="btn primary" id="btnAll">全部题目</button>
      <span class="sep">|</span>
      <button class="btn" id="btnQuiz">模拟考试 (随机30题)</button>
      <span class="sep">|</span>
      <button class="btn" id="btnShowAll">全部展开解析</button>
      <button class="btn" id="btnReset">重置答题</button>
    </div>

    <div id="resultBox" class="result-box">
      <div class="result-score" id="resultScore"></div>
      <div class="result-label" id="resultLabel"></div>
      <button class="btn primary" style="margin-top:14px" onclick="resetAll()">重新作答</button>
    </div>

    <div class="prog-wrap" id="progWrap" style="display:none">
      <div class="prog-label"><span id="progText">0 / 30</span><span id="progPct">0%</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>

    <div id="qContainer"></div>
  </div>
</main>

<script>
// ════════════════════════════════════════════════════════════
//  QUESTION BANK
// ════════════════════════════════════════════════════════════
const QB = [

// ─────────────────────────────────────────────────────────
// L1 · 第一章 基础概念
// ─────────────────────────────────────────────────────────
{ch:"L1",label:"第1章 · 基础概念",
q:"文件方式下，以下哪种说法是 NOT CORRECT？",
opts:[
  "文件方式会导致同一信息在不同应用中被分开存储（数据冗余）。",
  "文件方式中，数据定义被包含在各自应用程序内部。",
  "文件方式中，不同应用可能使用新旧两个版本的同一数据。",
  "文件方式中，修改一个文件的结构很容易处理，因为每个应用有自己的文件。"
],
ans:3,
exp:`
<div class="exp-why">✅ <b>D 错误</b>（即答案）：文件方式的根本缺陷恰恰在于"数据—程序强耦合"：数据结构变化了，所有读取该文件的应用程序都需要手动修改，根本不"容易"。</div>
<div class="exp-trap">⚠️ A/B/C 全都是文件方式的真实缺陷（重复存储、定义耦合、版本不一致），均为正确表述。</div>
<div class="exp-trap">💡 <b>核心概念</b>：文件方式 = 数据定义硬编码在程序中 → 数据独立性为零。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"数据库方式下，以下哪种说法是 NOT CORRECT？",
opts:[
  "在数据库方式中，所有应用程序通过 DBMS 接口访问同一版本数据。",
  "在数据库方式中，数据定义或元数据存储在应用程序内部。",
  "与文件方式相比，数据库方式通常需要更少的存储空间。",
  "在数据库方式中，数据和元数据的维护更容易。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 错误</b>：数据库方式的核心特征之一是将元数据（schema）集中存放在<b>目录/数据字典（catalog）</b>中，而非分散在各应用程序中。</div>
<div class="exp-trap">💡 目录（catalog）= DBMS 存放所有 schema 定义的地方，也叫 data dictionary 或 system catalog。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"以下关于文件方式的说法，哪个是 NOT CORRECT？",
opts:[
  "文件方式容易导致不一致数据。",
  "文件方式有利于并发控制。",
  "文件方式导致应用程序与数据之间的强依赖关系。",
  "文件方式导致重复信息，浪费存储资源。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 错误</b>：文件系统没有内置的并发控制机制，多个程序同时写同一文件会产生"丢失更新（lost update）"等问题。并发控制正是 DBMS 的核心优势。</div>
<div class="exp-trap">💡 DBMS 通过锁（locking）或多版本（MVCC）提供并发控制，文件系统根本没有。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"关于 SQL，以下哪种说法是 NOT CORRECT？",
opts:[
  "在文件方式中，每个应用有各自的查询和访问过程，即使它们访问同一数据。",
  "SQL 是管理 DBMS 而无需编写大量编程代码的数据库语言。",
  "SQL 是一种关注"如何（HOW）"访问和检索数据的数据库语言。",
  "SQL 允许不同应用访问各自所需的数据子集。"
],
ans:2,
exp:`
<div class="exp-why">✅ <b>C 错误</b>：SQL 是<b>声明式（declarative）</b>语言，表达的是"查什么（WHAT）"而非"怎么查（HOW）"。HOW（即访问路径、执行计划）由 DBMS 的查询优化器决定。</div>
<div class="exp-trap">💡 声明式 vs 过程式：SQL = 声明式 = set-at-a-time；CODASYL DML = 过程式 = record-at-a-time（自己指定导航路径）。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"以下哪项说法是正确的（CORRECT）？",
opts:[
  "查询数据库系统比查询文件系统更麻烦。",
  "文件方式使用元数据定义数据，这些定义存储在目录（catalog）中。",
  "数据库方式更高效地利用可用存储空间。",
  "文件系统的维护比数据库系统容易得多。"
],
ans:2,
exp:`
<div class="exp-why">✅ <b>C 正确</b>：数据库方式通过集中管理、消除冗余来减少存储浪费。A 错（SQL 让查询更简洁）；B 错（文件方式的元数据在程序里，不在 catalog 里，catalog 是 DBMS 的特征）；D 错（DBMS 维护更系统化，但文件系统维护并不更容易）。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"以下哪项说法是 NOT CORRECT？",
opts:[
  "在概念数据模型中，应捕获并建模业务的数据需求。",
  "概念数据模型是实现相关的（implementation dependent）。",
  "逻辑数据模型将概念数据模型转化为特定实现环境的模型。",
  "逻辑数据模型的实现示例包括层次、CODASYL、关系或面向对象模型。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 错误</b>：概念数据模型（如 ER 模型）是<b>实现无关的（implementation independent）</b>，它只描述业务需求，不涉及任何具体技术实现。实现相关的是逻辑/内部数据模型。</div>
<div class="exp-trap">💡 三层数据模型：概念（conceptual）→ 业务语义；逻辑（logical）→ 实现技术（关系/层次…）；内部（internal）→ 物理存储细节。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"以下哪项说法是正确的（CORRECT）？",
opts:[
  "与业务用户沟通主要使用逻辑数据模型。",
  "数据库状态包含数据库数据的描述，存储在目录（catalog）中。",
  "逻辑数据模型是实现无关的。",
  "内部数据模型表示数据的物理存储细节。"
],
ans:3,
exp:`
<div class="exp-why">✅ <b>D 正确</b>：内部数据模型（internal data model）描述数据在磁盘上的实际存储方式（文件组织、索引结构、页大小等）。</div>
<div class="exp-trap">A 错：与业务用户沟通用<b>概念</b>数据模型（ER图）。B 错：数据库<b>状态（state）</b>是数据库在某一时刻的数据内容，而<b>模式（schema）</b>才存在 catalog 中。C 错：实现无关的是<b>概念</b>数据模型，逻辑模型依赖实现平台（如关系型）。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"在三层体系结构中，以下哪项说法是 NOT CORRECT？",
opts:[
  "数据库的外层（external layer）包含逻辑和概念数据模型。",
  "三层体系结构中任意层的变化应尽量不影响其他层。",
  "内部数据模型位于内层（internal layer）。",
  "可以为特定应用或用户组定义视图，便于访问控制和安全管理。"
],
ans:0,
exp:`
<div class="exp-why">✅ <b>A 错误</b>：外层（external layer）包含的是<b>用户视图（views）</b>，而不是逻辑/概念数据模型。逻辑数据模型在中间层（conceptual/logical layer），内部数据模型在内层（internal layer）。</div>
<div class="exp-trap">💡 三层对应：External = Views；Conceptual/Logical = Schema；Internal = Physical storage。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"在三层体系结构中，外层与概念/逻辑层之间存在哪种数据独立性？",
opts:[
  "物理数据独立性（Physical data independence）",
  "逻辑数据独立性（Logical data independence）",
  "两者没有独立性，它们基本上是同一件事",
  "内层（internal layer）"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：<b>逻辑数据独立性</b>：概念/逻辑模型的变化不影响外层的应用程序和视图。<b>物理数据独立性</b>：内部存储的变化不影响概念/逻辑层及应用程序。</div>
<div class="exp-trap">💡 记忆法：Logical independence → 上面两层之间（external ↔ conceptual）；Physical independence → 下面两层之间（conceptual ↔ internal）。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"以下哪项说法是 NOT CORRECT？",
opts:[
  "物理数据独立性意味着内部存储规范的变化不应影响应用、视图及逻辑数据模型。",
  "逻辑数据独立性意味着逻辑/概念数据模型的变化对应用程序的影响最小。",
  "逻辑数据独立性意味着逻辑/概念数据模型的变化不应影响数据存储规范。",
  "只有结构化数据才能在正式的逻辑数据模型中描述。"
],
ans:2,
exp:`
<div class="exp-why">✅ <b>C 错误</b>：C 描述的方向是错的。逻辑数据独立性说的是：逻辑/概念层变化 → 外层（应用/视图）不受影响。而"逻辑层变化不影响存储规范"是物理独立性的部分描述，不是逻辑独立性。</div>
<div class="exp-trap">💡 记忆：Logical independence 保护的是上层（应用程序）；Physical independence 保护的是中层（逻辑模型）。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"以下哪项说法是 NOT CORRECT？",
opts:[
  "DBMS 的三个 KPI 是响应时间（response time）、吞吐率（throughput rate）和空间利用率（space utilization）。",
  "响应时间是构建概念数据模型所需的时间。",
  "吞吐率是 DBMS 每单位时间能处理的事务数。",
  "空间利用率是存储原始数据和元数据所占用的空间。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 错误</b>：响应时间（response time）= 系统处理一个查询/事务并返回结果所需的时间，与构建概念数据模型毫无关系。</div>
<div class="exp-trap">💡 三 KPI：① Response time（用户等待时间，越短越好）；② Throughput rate（TPS，越高越好）；③ Space utilization（存储效率，越高越好）。</div>`
},

{ch:"L1",label:"第1章 · 基础概念",
q:"关于 ACID 属性，以下哪项说法是 NOT CORRECT？",
opts:[
  "ACID 代表 Availability（可用性）、Consistency（一致性）、Isolation（隔离性）和 Durability（持久性）。",
  "Durability（持久性）意味着每个成功事务的效果是永久的。",
  "Consistency（一致性）确保数据库始终处于一致状态。",
  "Isolation（隔离性）确保并发事务的效果与它们串行执行时相同。"
],
ans:0,
exp:`
<div class="exp-why">✅ <b>A 错误</b>：ACID 中 A = <b>Atomicity（原子性）</b>，而非 Availability。Availability（可用性）是 CAP 定理中的概念，与 ACID 无关！</div>
<div class="exp-trap">💡 ACID 完整含义：<b>A</b>tomicity（原子性：全做或全不做）；<b>C</b>onsistency（一致性：从一个合法状态到另一个合法状态）；<b>I</b>solation（隔离性：并发事务互不干扰）；<b>D</b>urability（持久性：提交的结果不会丢失）。</div>
<div class="exp-trap">⚠️ 考试常见陷阱：把 Atomicity 写成 Availability。</div>`
},

<div class="exp-trap">💡 反例：若拆成 S-P、S-C、P-C 三个二元关系，无法知道"S 在哪个 P 中供应了 C"——三方组合信息丢失。</div>

},

{ch:"L3",label:"第3章 · EER 与 UML",

<div class="exp-trap">⚠️ 这是考试信息中明确提到的重点：<i>"foreign key NULL or NOT NULL"</i>。</div>`
},

},

{ch:"L6",label:"第6章 · 关系数据库",
q:"以下关于范式（Normal Forms）的说法，哪项是正确的？",
opts:[
  "满足第三范式（3NF）的关系一定满足 BCNF（Boyce-Codd Normal Form）。",
  "第一范式（1NF）要求每个属性的值必须是原子的（atomic），不允许多值或复合属性。",
  "2NF 要求消除所有传递依赖（transitive dependency）。",
  "BCNF 要求每个非主属性对每个候选键的局部依赖。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：1NF（第一范式）= 所有属性都是<b>原子值</b>，不能有重复组、嵌套关系或集合值属性。</div>
<div class="exp-trap">A 错：3NF ⊂ 2NF ⊂ 1NF，但 BCNF 比 3NF 更严格；3NF 不一定满足 BCNF。</div>
<div class="exp-trap">C 错：消除传递依赖是 <b>3NF</b> 的要求（消除 A→B→C 中的 A→C 通过非主属性的传递）；2NF 消除的是<b>局部依赖（partial dependency）</b>（非主属性依赖候选键的真子集）。</div>`
},

{ch:"L6",label:"第6章 · 关系数据库",new:true,
q:"【自编题】有关系模式 R(A, B, C, D)，函数依赖 F = {AB→C, C→D, D→A}。以下哪项关于该关系范式的说法正确？",
opts:[
  "R 满足 BCNF，因为每个函数依赖的左侧都是超键。",
  "R 不满足 3NF，因为存在 A→D→A 这样的循环依赖。",
  "R 不满足 BCNF，因为 C→D 中 C 不是超键；但 R 满足 3NF，因为 D 是候选键 AB 的一部分依赖链中的属性。",
  "R 满足 2NF 但不满足 3NF，因为存在传递依赖 AB→C→D。"
],
ans:3,
exp:`
<div class="exp-why">✅ <b>D 正确</b>：分析函数依赖：AB→C（C 依赖完整 AB，无局部依赖 → 满足 2NF）；C→D 是传递依赖（AB→C→D，而 C 不是候选键）→ <b>不满足 3NF</b>。因此 R 满足 2NF 但不满足 3NF（更不满足 BCNF）。</div>
<div class="exp-trap">💡 候选键：需要找能唯一确定所有属性的最小属性集。AB→C, C→D, D→A → AB 能确定 C→D→A，即 AB 是候选键。C→D→A，但 C 不能单独确定 B，所以 C 不是候选键。BCNF 要求：每个非平凡函数依赖的左边都是超键。C→D 违反这一要求，所以不满足 BCNF。</div>`
},

{ch:"L7",label:"第7章 · SQL 进阶",
q:"以下关于相关子查询（correlated subquery）的说法，哪项是正确的？",
opts:[
  "相关子查询只执行一次，其结果被外层查询重复使用。",
  "相关子查询中，内层查询引用了外层查询的列；对外层每一行，内层查询都重新执行一次。",
  "相关子查询和非相关子查询的性能完全相同。",
  "在 SQL 标准中，相关子查询只能出现在 WHERE 子句中，不能出现在 SELECT 列表中。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：<b>相关子查询（correlated subquery）</b>：内层查询引用外层查询的列（如 WHERE inner.col = outer.col），因此对外层每一行，内层都要重新执行 → 性能通常低于非相关子查询。</div>
<div class="exp-trap">A 错：只执行一次的是<b>非相关子查询（non-correlated）</b>，其结果与外层无关。C 错：相关子查询通常更慢（O(n)倍执行）。D 错：相关子查询也可以出现在 SELECT 列表中（标量相关子查询）。</div>`
},

{ch:"L7",label:"第7章 · SQL 进阶",new:true,
q:"【自编题】以下 SQL 使用 Purchase Order 数据库。哪个查询正确地找出"从未下过订单的供应商"？",
opts:[
  `SELECT S.SUPNR, S.SUPNAME FROM SUPPLIER S WHERE S.SUPNR NOT IN (SELECT PO.SUPNR FROM PURCHASE_ORDER PO)`,
  `SELECT S.SUPNR, S.SUPNAME FROM SUPPLIER S WHERE NOT EXISTS (SELECT * FROM PURCHASE_ORDER PO WHERE PO.SUPNR = S.SUPNR)`,
  `SELECT S.SUPNR, S.SUPNAME FROM SUPPLIER S, PURCHASE_ORDER PO WHERE S.SUPNR = PO.SUPNR AND PO.PONR IS NULL`,
  "A 和 B 的结果始终相同，但当子查询结果包含 NULL 时 B 更安全。"
],
ans:3,
exp:`
<div class="exp-why">✅ <b>D 正确（考试重点！）</b>：A（NOT IN）和 B（NOT EXISTS）在子查询不含 NULL 时等价。<b>但若 PURCHASE_ORDER.SUPNR 有 NULL 值，NOT IN 会返回空集</b>（因为 NULL 与任何值的 IN 比较都是 UNKNOWN，NOT IN 全部为 UNKNOWN，无行被选中）。NOT EXISTS 不受 NULL 影响。因此 B 更安全、更推荐。</div>
<div class="exp-trap">💡 <b>NOT IN vs NOT EXISTS 的 NULL 陷阱</b>：这是 SQL 最著名的陷阱之一。实际应用中优先用 NOT EXISTS 或 LEFT JOIN ... WHERE IS NULL。C 选项语义错误（inner join 后 PONR IS NULL 无意义）。</div>`
},

{ch:"L7",label:"第7章 · SQL 进阶",new:true,
q:"【自编题】以下 SQL 查询的含义是什么？\n<code>SELECT P.PRODNAME FROM PRODUCT P WHERE P.AVAILABLE_QUANTITY >= ALL (SELECT P2.AVAILABLE_QUANTITY FROM PRODUCT P2)</code>",
opts:[
  "查找所有库存量大于 0 的产品名称。",
  "查找库存量最大的产品名称（大于等于所有其他产品的库存量）。",
  "查找库存量大于某个产品库存量的产品名称。",
  "查找库存量等于平均库存量的产品名称。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：<code>X >= ALL (subquery)</code> = X 大于等于子查询返回的<b>所有</b>值 → 即 X 是最大值（MAX）。等价于 <code>WHERE P.AVAILABLE_QUANTITY = (SELECT MAX(AVAILABLE_QUANTITY) FROM PRODUCT)</code>。</div>
<div class="exp-trap">💡 ALL vs ANY：<code>>= ALL</code> = 最大值；<code><= ALL</code> = 最小值；<code>> ANY</code> = 大于最小值；<code>= ANY</code> 等价于 <code>IN</code>。</div>`
},

{ch:"L7",label:"第7章 · SQL 进阶",new:true,

opts:[
  "视图总是在查询时实时计算，不存储数据（除非是物化视图）。",
  "通过视图进行 INSERT/UPDATE/DELETE 总是被允许的。",
  "视图一旦创建就不能修改，只能删除后重建。",

<div class="exp-why">✅ <b>A 正确</b>：普通视图（virtual view）= 存储的是查询定义，不存储数据，每次访问都动态执行查询。<b>物化视图（materialized view）</b>才会将结果预先计算并存储。</div>
<div class="exp-trap">B 错：不是所有视图都可更新。包含 GROUP BY、聚合函数、DISTINCT、多表 JOIN 的视图通常不可更新。C 错：可以用 CREATE OR REPLACE VIEW。D 错：视图可以引用其他视图（嵌套视图）。</div>`
},

{ch:"L7",label:"第7章 · SQL 进阶",new:true,
q:"【自编题】ROLLUP 运算符的作用是什么？以下哪项对 GROUP BY ROLLUP(A, B) 的描述最准确？",
opts:[
  "生成 (A,B)、(A)、(B)、() 四组聚合结果（所有维度组合）。",
  "生成 (A,B)、(A)、() 三组聚合结果（按层次从细到粗汇总）。",
  "生成 (A,B)、(B)、() 三组聚合结果。",
  "ROLLUP 和 CUBE 产生完全相同的结果集。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：ROLLUP(A, B) 按<b>从右到左逐步去掉维度</b>生成层次汇总：(A,B) → (A) → ()，共 n+1 组（n=维度数）。</div>
<div class="exp-trap">A 描述的是 <b>CUBE(A,B)</b>，生成所有 2^n 组合：(A,B)、(A)、(B)、()。ROLLUP 按层次汇总，CUBE 按全组合汇总。C 错（顺序/内容不对）。D 错（CUBE ≠ ROLLUP）。</div>
<div class="exp-trap">💡 GROUPING SETS 最灵活，可以手动指定要哪些组合。ROLLUP 等价于 GROUPING SETS((A,B),(A),())。</div>`
},

],

},

},

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",
q:"以下哪种并发问题描述了"一个事务读取了另一个<b>未提交</b>事务修改的数据"？",
opts:[
  "丢失更新（Lost update）",
  "脏读（Dirty read）",
  "不可重复读（Non-repeatable read / Inconsistent read）",
  "幻读（Phantom read）"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：<b>脏读（Dirty read）</b>：事务 T2 读取了事务 T1 已修改但尚未提交的数据；若 T1 随后回滚，T2 读到的数据就是"脏的"（从未真正存在过）。</div>
<div class="exp-trap">💡 四种并发问题：<b>Lost update</b>（两个事务先后写同一数据，后者覆盖前者的更新）；<b>Dirty read</b>（读未提交数据）；<b>Non-repeatable read</b>（同一事务内两次读同一行，值不同）；<b>Phantom read</b>（同一事务内两次查询，第二次多出或少了行）。</div>`
},

opts:[
  "共享锁（S-lock / read lock）允许多个事务并发读取同一数据项；排他锁（X-lock / write lock）允许一个事务独占读写。",
  "两阶段锁定协议（2PL）要求所有锁必须在事务开始前全部获取。",
  "使用锁的系统完全不可能发生死锁（deadlock）。",

],
ans:0,
exp:`
<div class="exp-why">✅ <b>A 正确</b>：S-lock（共享/读锁）可以被多个事务同时持有；X-lock（排他/写锁）只能被一个事务持有，且与 S-lock 互斥。</div>
<div class="exp-trap">B 错（2PL 分两个阶段：增长阶段 growing phase 获取锁，收缩阶段 shrinking phase 释放锁；不是事务开始前全部获取，那是"静态锁定"）；C 错（锁机制<b>可能导致</b>死锁，需要死锁检测/预防机制）；D 错（Strict 2PL 要求所有锁在事务<b>提交或回滚后</b>才释放，以防止级联回滚）。</div>`
},

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",
q:"以下关于基于日志的恢复（log-based recovery）的说法，哪项正确？",
opts:[
  "UNDO 操作用于重新执行已提交事务的修改（防止丢失）。",
  "REDO 操作用于撤销未提交或中止事务的修改。",
  "检查点（checkpoint）允许恢复时跳过检查点之前已确认的事务，减少 REDO/UNDO 的范围。",
  "WAL（Write-Ahead Logging）规则要求数据页必须在日志记录写入磁盘<b>之前</b>写入磁盘。"
],
ans:2,
exp:`
<div class="exp-why">✅ <b>C 正确</b>：检查点（checkpoint）定期将缓冲区内容刷到磁盘并记录当前活跃事务列表；崩溃恢复时只需从最近的检查点开始分析日志，大幅缩短恢复时间。</div>
<div class="exp-trap">A 错（UNDO 撤销未提交事务；REDO 重做已提交事务）；B 错（与 A 相反）；D 错（WAL 要求日志必须在数据页写入磁盘<b>之前</b>先写入磁盘——"先写日志"，保证崩溃后可恢复）。</div>
<div class="exp-trap">💡 WAL = Write-Ahead Logging = 先写日志，再写数据。这是数据库持久性（Durability）的实现基础。</div>`
},

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",new:true,
q:"【自编题】以下事务并发执行时序（T1 和 T2 操作余额 Balance=2000）：\nt1: T1 Read(Balance)=2000\nt2: T2 Read(Balance)=2000  \nt3: T1 Balance:=2000+1000=3000, Write(Balance)\nt4: T2 Balance:=2000+10000=12000, Write(Balance)\nt5: T1 Commit；t6: T2 Commit\n\n最终 Balance 是多少？这属于哪种并发问题？",
opts:[
  "最终 Balance = 13000；这是脏读（dirty read）。",
  "最终 Balance = 12000；这是丢失更新（lost update）——T2 的写操作覆盖了 T1 已提交的写。",
  "最终 Balance = 3000；这是不可重复读（non-repeatable read）。",
  "最终 Balance = 15000；ACID 保证两次更新都被应用。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：这是经典的<b>丢失更新（Lost Update）</b>问题：T1 和 T2 都读取了初始值 2000，然后各自计算新值（3000 和 12000）并写入——T2 最后写入，T1 的更新被覆盖，最终 Balance = 12000，而不是期望的 13000（2000+1000+10000）。</div>
<div class="exp-trap">💡 解决方案：使用 X-lock（排他锁）确保 T2 在 T1 完成写操作（包括 Commit）之前无法读取 Balance → T2 会读到 3000，最终正确结果为 13000。</div>
<div class="exp-trap">⚠️ D 选项"ACID 保证两次更新都被应用"是错的——ACID 属性由 DBMS 通过并发控制机制来保证，如果事务不正确并发执行，DBMS 需要加锁来防止问题，而不是自动合并两次更新。</div>`
},

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",new:true,
q:"【自编题】关于死锁（deadlock）的处理，以下哪项描述最准确？",
opts:[
  "死锁预防（prevention）：事务运行前预先获取所有需要的锁，或按固定顺序申请锁，使死锁不可能发生。",
  "死锁检测（detection）：系统主动阻止可能导致死锁的锁请求，实时检测等待图并中止事务。",
  "超时（timeout）是最精确的死锁处理机制，可以准确识别哪个事务处于死锁状态。",
  "在实际数据库系统中，死锁预防总是比死锁检测更高效，因此所有主流 DBMS 都只用预防。"
],
ans:0,
exp:`
<div class="exp-why">✅ <b>A 正确</b>：死锁<b>预防（prevention）</b>的方法：① 预先声明所有需要的资源（conservative locking）；② 强制资源按固定顺序申请（ordered locking，如按表名字母顺序），使等待图不可能出现环路 → 死锁不可能发生。</div>
<div class="exp-trap">B 错（死锁<b>检测</b>是让死锁发生后再处理，通过等待图 wait-for graph 找环；不是"实时阻止"请求）；C 错（超时只是简单地在等待时间过长时回滚，不能精确区分"死锁"和"正常长时间等待"）；D 错（主流 DBMS 通常用<b>检测+回滚</b>，因为预防开销大）。</div>`
},

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",
q:"数据库崩溃恢复时，以下哪项描述了 UNDO 和 REDO 操作的正确使用场景？",
opts:[
  "UNDO 用于重新执行已提交事务的修改（前滚）；REDO 用于撤销未提交事务的修改（回滚）。",
  "UNDO 用于撤销未提交或已中止事务的修改（回滚）；REDO 用于重新执行已提交事务（前滚），以防止持久性损失。",
  "崩溃恢复只需要 UNDO；REDO 只在正常执行中使用。",
  "UNDO 和 REDO 只有在使用检查点（checkpoint）时才需要。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：崩溃恢复分析：从日志中找出哪些事务需要 UNDO（崩溃时未提交 → 需要撤销），哪些需要 REDO（崩溃前已提交但修改可能未写入磁盘 → 需要重做）。</div>
<div class="exp-trap">💡 Recovery 步骤：① Analysis：分析日志，确定哪些事务需要 UNDO/REDO；② REDO phase：重做所有已提交事务（从最近检查点开始）；③ UNDO phase：撤销所有未提交事务。</div>
<div class="exp-trap">记忆：REDO = 已提交但可能未写盘（保 Durability）；UNDO = 未提交但可能已写盘（保 Atomicity）。</div>`
},

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",new:true,
q:"【自编题】检查点（checkpoint）时刻有五个事务 T1–T5，状态如下：T1 在检查点前已提交；T2 在检查点时活跃，崩溃前未提交；T3 在检查点后开始并在崩溃前提交；T4 在检查点后开始并在崩溃前提交；T5 在检查点后开始，崩溃时未提交。恢复时应对哪些事务执行 UNDO？",
opts:[
  "T1、T3、T4（已提交的事务需要重做）",
  "T2、T5（未提交的事务需要撤销）",
  "所有五个事务都需要 UNDO",
  "T1 不需要任何操作；T2 和 T5 需要 UNDO；T3 和 T4 需要 REDO"
],
ans:3,
exp:`
<div class="exp-why">✅ <b>D 正确</b>：分析各事务：T1 在检查点前已提交 → <b>无需操作</b>（数据已持久化）；T2 检查点时活跃，崩溃前未提交 → <b>UNDO</b>；T3/T4 检查点后提交 → <b>REDO</b>（可能提交后数据还在内存未写磁盘）；T5 未提交 → <b>UNDO</b>。</div>

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",new:true,
q:"【自编题】两阶段锁定协议（2PL）有哪些变体？以下哪项描述最准确？",
opts:[
  "基本 2PL：增长阶段获取锁，收缩阶段释放锁，但可能导致级联回滚（cascading rollback）。Strict 2PL（严格 2PL）：所有锁在事务提交/回滚后才释放，防止级联回滚。Static 2PL（静态 2PL）：事务开始前预先获取所有需要的锁，防止死锁。",
  "基本 2PL 完全防止死锁；Strict 2PL 允许级联回滚；Static 2PL 性能最差但并发度最高。",
  "所有 2PL 变体都能同时防止死锁和级联回滚。",
  "2PL 是一种乐观并发控制协议，不使用锁，只在提交时验证冲突。"
],
ans:0,
exp:`
<div class="exp-why">✅ <b>A 正确</b>：<b>基本 2PL</b>：满足可串行化，但不防止级联回滚（因为可能在 Commit 前释放锁，允许其他事务读到已解锁但未提交的数据）；也不防止死锁。<b>Strict 2PL（严格）</b>：排他锁（X-lock）持有到 Commit，防止级联回滚，是最常用的实际实现。<b>Static 2PL（静态/保守）</b>：事务开始前声明并获取所有锁，防止死锁，但实际不可行（事务开始时不知道需要哪些锁）。</div>
<div class="exp-trap">💡 工业实践：绝大多数 DBMS 使用 Strict 2PL（或称 Rigorous 2PL）。</div>`
},

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",new:true,
q:"【自编题】多粒度锁定（Multi-Granularity Locking, MGL）除了共享锁（S）和排他锁（X）外，还引入了哪些新的锁类型？它们的作用是什么？",
opts:[
  "MGL 只使用 S 和 X 锁，不引入新类型。",
  "MGL 引入意向锁：IS（Intention Shared）和 IX（Intention Exclusive）。在父节点（如表级）加意向锁，表示子节点（如行级）将被加 S 或 X 锁，使上层无需扫描所有子节点即可检测冲突。",
  "MGL 引入 U 锁（Update lock）用于防止更新操作的死锁。",
  "MGL 引入 NL（No Lock）模式，允许某些操作完全绕过锁检查。"
],
ans:1,
exp:`
<div class="exp-why">✅ <b>B 正确</b>：MGL（多粒度锁定）在锁层次结构（数据库 → 表 → 页 → 行）中引入<b>意向锁（intention locks）</b>：IS（意向共享）= 将在子节点加 S 锁；IX（意向排他）= 将在子节点加 X 锁。当一个事务想对某行加 X 锁时，先在表级加 IX 锁，这样其他事务想对整张表加 S 或 X 锁时，可以立即检测到冲突，无需扫描所有行。</div>
<div class="exp-trap">💡 MGL 锁申请规则：<b>从上到下</b>（数据库→表→页→行）申请锁；<b>从下到上</b>（行→页→表→数据库）释放锁。意向锁使粗粒度锁（表锁）和细粒度锁（行锁）可以共存。</div>`
},

{ch:"L10",label:"第10章 · 事务管理 (Ch14)",
q:"以下哪项关于 WAL（Write-Ahead Logging，预写日志）的说法是正确的？",

  "WAL 只在使用乐观并发控制时才需要。",

<div class="exp-trap">A 错（方向相反，A 描述的是"后写日志"——这样崩溃后无法恢复）；C 错（WAL 与并发控制协议无关，所有 DBMS 都需要 WAL 来保证恢复）；D 错（日志也记录未提交事务的修改，以便崩溃后 UNDO）。</div>`

// ════════════════════════════════════════════════════════════
//  UI LOGIC
// ════════════════════════════════════════════════════════════
const CHAPTERS = [...new Set(QB.map(q=>q.ch))];
const CH_LABELS = {};
QB.forEach(q=>{ CH_LABELS[q.ch]=q.label; });

let state = {
  answered: {},  // qid -> chosen index
  mode: 'all',   // 'all' | 'quiz' | 'chapter'
  quizQs: [],
  activeChapter: null,
};

function getVisible() {
  if (state.mode==='quiz') return state.quizQs;
  if (state.mode==='chapter') return QB.filter(q=>q.ch===state.activeChapter);
  return QB;
}

function render() {
  const visible = getVisible();
  const container = document.getElementById('qContainer');
  container.innerHTML = '';

  visible.forEach((q,i) => {
    const qid = QB.indexOf(q);
    const chosen = state.answered[qid];
    const submitted = chosen !== undefined;

    const div = document.createElement('div');
    div.className = 'qblock';

    const tagNew = q.new ? '<span class="tag new">自编题</span>' : '';
    const tagCh = `<span class="tag">${q.label}</span>`;

    let optsHtml = q.opts.map((opt,oi)=>{
      let cls = 'opt';
      if (submitted) {
        if (oi===q.ans) cls+=' correct';
        else if (oi===chosen) cls+=' wrong';
      }
      const checked = chosen===oi ? 'checked' : '';
      const disabled = submitted ? 'disabled' : '';
      // Render code tags in option text
      const optText = opt.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>');
      return `<label class="${cls}"><input type="radio" name="q${qid}" value="${oi}" ${checked} ${disabled} onchange="choose(${qid},${oi})"><span>${optText}</span></label>`;
    }).join('');

    const expHtml = submitted ? `<div class="exp show"><div class="exp-head">解析 / Explanation</div>${q.exp}</div>` : `<div class="exp"></div>`;

    const qText = q.q.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>');

    div.innerHTML = `
      <div class="qmeta">${tagCh}${tagNew}<span style="margin-left:auto;color:var(--muted);font-size:13px">Q${i+1}</span></div>
      <div class="qtxt">${qText}</div>
      <div class="opts">${optsHtml}</div>
      ${expHtml}`;
    container.appendChild(div);
  });

  updateStats();
  updateProgress();
}

function choose(qid, oi) {
  if (state.answered[qid]!==undefined) return;
  state.answered[qid] = oi;
  const q = QB[qid];
  // Mark opts
  const opts = document.querySelectorAll(`input[name="q${qid}"]`);
  opts.forEach((inp,i)=>{
    const lbl = inp.closest('label');
    inp.disabled = true;
    if (i===q.ans) lbl.classList.add('correct');
    else if (i===oi) lbl.classList.add('wrong');
  });
  // Show explanation
  const qblock = opts[0].closest('.qblock');
  const exp = qblock.querySelector('.exp');
  exp.innerHTML = '<div class="exp-head">解析 / Explanation</div>' + q.exp;
  exp.classList.add('show');

  updateStats();
  updateProgress();
  checkQuizComplete();
}

function checkQuizComplete() {
  if (state.mode!=='quiz') return;
  const qs = state.quizQs;
  const allDone = qs.every(q=>state.answered[QB.indexOf(q)]!==undefined);
  if (!allDone) return;
  let correct = 0;
  qs.forEach(q=>{
    const qid = QB.indexOf(q);
    if (state.answered[qid]===q.ans) correct++;
  });
  const rb = document.getElementById('resultBox');
  const n = qs.length;
  const score = (correct - (n-correct)/3).toFixed(2);
  document.getElementById('resultScore').textContent = score + ' / 20';
  document.getElementById('resultLabel').textContent = `答对 ${correct} 题，答错 ${n-correct} 题 (${n} 题总计)。按 -1/3 扣分制估算得分。`;
  rb.classList.add('show');
  rb.scrollIntoView({behavior:'smooth',block:'start'});
}

function updateStats() {
  const visible = getVisible();
  const total = visible.length;
  let done=0,right=0,wrong=0;
  visible.forEach(q=>{
    const qid=QB.indexOf(q);
    const ch=state.answered[qid];
    if (ch!==undefined){done++;if(ch===q.ans)right++;else wrong++;}
  });
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statRight').textContent=right;
  document.getElementById('statWrong').textContent=wrong;
  document.getElementById('statPct').textContent=done>0?Math.round(right/done*100)+'%':'—';
}

function updateProgress() {
  const pw = document.getElementById('progWrap');
  if (state.mode!=='quiz'){pw.style.display='none';return;}
  pw.style.display='block';
  const qs=state.quizQs;
  const done=qs.filter(q=>state.answered[QB.indexOf(q)]!==undefined).length;
  const pct=Math.round(done/qs.length*100);
  document.getElementById('progText').textContent=`${done} / ${qs.length}`;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
}

function buildChapList() {
  const cl = document.getElementById('chapList');
  cl.innerHTML='';
  CHAPTERS.forEach(ch=>{
    const count=QB.filter(q=>q.ch===ch).length;
    const btn=document.createElement('button');
    btn.className='chap-btn';
    btn.innerHTML=`${CH_LABELS[ch]}<small>${count} 题</small>`;
    btn.onclick=()=>switchChapter(ch);
    cl.appendChild(btn);
  });
}

function switchChapter(ch) {
  state.mode='chapter';
  state.activeChapter=ch;
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('progWrap').style.display='none';
  document.querySelectorAll('.chap-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.startsWith(CH_LABELS[ch]));
  });
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetAll() {
  state.answered={};
  document.getElementById('resultBox').classList.remove('show');
  render();
}

// BUTTONS
document.getElementById('btnAll').onclick=()=>{
  state.mode='all';state.activeChapter=null;
  document.getElementById('resultBox').classList.remove('show');
  document.querySelectorAll('.chap-btn').forEach(b=>b.classList.remove('active'));
  render();window.scrollTo({top:0,behavior:'smooth'});
};

document.getElementById('btnQuiz').onclick=()=>{
  const shuffled=[...QB].sort(()=>Math.random()-.5).slice(0,30);
  state.quizQs=shuffled;state.mode='quiz';
  document.getElementById('resultBox').classList.remove('show');
  document.querySelectorAll('.chap-btn').forEach(b=>b.classList.remove('active'));
  render();window.scrollTo({top:0,behavior:'smooth'});
};

document.getElementById('btnShowAll').onclick=()=>{
  document.querySelectorAll('.exp').forEach(e=>{
    const q=QB[+e.closest('.qblock').querySelector('input[type=radio]').name.replace('q','')];
    if(!e.innerHTML.includes('解析')){
      e.innerHTML='<div class="exp-head">解析 / Explanation</div>'+q.exp;
    }
    e.classList.add('show');
  });
};

document.getElementById('btnReset').onclick=resetAll;

// INIT
buildChapList();
render();
</script>
</body>
</html>
